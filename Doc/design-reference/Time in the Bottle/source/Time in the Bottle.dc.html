<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#161619"/><rect x="34" y="22" width="32" height="56" rx="3" fill="#0d0d10" stroke="#2a2a2f" stroke-width="2"/><rect x="36" y="54" width="28" height="22" fill="#e0a24e"/><rect x="36" y="48" width="28" height="6" fill="#46b6a6"/><rect x="48" y="30" width="4" height="4" fill="#e0a24e"/><rect x="42" y="38" width="4" height="4" fill="#9c82dd"/></svg>
</template>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0}
  @keyframes blink{0%,55%{opacity:1}56%,100%{opacity:0}}
</style>
</helmet>
<div style="min-height:100vh;box-sizing:border-box;display:flex;align-items:center;justify-content:center;background:#e7e5df;padding:40px;font-family:'JetBrains Mono',ui-monospace,monospace">
  <div style="background:#faf9f6;border:1px solid #e0ded6;border-radius:6px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 12px 40px rgba(0,0,0,.06);padding:26px 28px 24px;display:flex;flex-direction:column;gap:20px">

    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:24px">
      <div>
        <div style="font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#1c1c1e;font-weight:700">Time in the Bottle</div>
        <div style="font-size:11.5px;color:#8a887e;margin-top:5px;letter-spacing:.02em">digital labor, one keystroke at a time</div>
      </div>
      <div style="display:flex;align-items:center;gap:7px;font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:#a09e94">
        <span style="width:6px;height:6px;border-radius:50%;background:#46b6a6;display:inline-block;animation:blink 2.4s infinite"></span>
        live
      </div>
    </div>

    <div style="display:flex;gap:28px;align-items:flex-start">

      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="position:relative;width:360px;height:560px">
          <canvas ref="{{ setCanvas }}" width="360" height="560" onPointerDown="{{ startDrag }}" style="display:block;width:360px;height:560px;background:#161619;border:1px solid #2a2a2f;border-radius:3px;image-rendering:pixelated;cursor:grab;touch-action:none"></canvas>

          <div style="position:absolute;top:7px;right:7px;bottom:7px;width:4px;border-radius:2px;background:rgba(255,255,255,0.06)">
            <div ref="{{ setThumb }}" style="position:absolute;left:0;width:100%;border-radius:2px;background:rgba(255,255,255,0.28);top:0;height:30%"></div>
          </div>

          <sc-if value="{{ browsing }}" hint-placeholder-val="{{ false }}">
            <button onClick="{{ goLive }}" style="position:absolute;top:10px;left:50%;transform:translateX(-50%);font-family:inherit;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#161619;background:#e0a24e;border:none;border-radius:20px;padding:7px 15px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.35)">&uarr; back to surface</button>
          </sc-if>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#a09e94">
          <span>the bottle &middot; drag down to dig</span>
          <span>{{ total }} keystrokes</span>
        </div>
      </div>

      <div style="width:272px;display:flex;flex-direction:column;gap:18px;align-self:stretch">
        <div style="font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#a09e94">who's pouring</div>

        <div style="display:flex;flex-direction:column;gap:13px">
          <sc-for list="{{ users }}" as="u" hint-placeholder-count="4">
            <div style="display:flex;flex-direction:column;gap:6px;padding:8px 9px;border-radius:4px;background: {{ u.rowBg }}">
              <div style="display:flex;align-items:center;gap:9px">
                <span style="width:9px;height:9px;border-radius:2px;flex:none;background: {{ u.color }}"></span>
                <span style="font-size:12.5px;color:#1c1c1e;font-weight:500;flex:1">{{ u.name }}</span>
                <span style="font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#b3b1a7">{{ u.role }}</span>
                <span style="font-size:12px;color:#55534c;font-weight:700;min-width:46px;text-align:right">{{ u.count }}</span>
              </div>
              <div style="height:5px;border-radius:3px;background:#ecebe4;overflow:hidden">
                <div style="height:100%;border-radius:3px;background: {{ u.color }};width: {{ u.pct }}%;transition:width .3s ease"></div>
              </div>
            </div>
          </sc-for>
        </div>

        <div style="display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:4px;background:#f2f1ea;font-size:11px;color:#8a887e">
          <span style="width:7px;height:7px;border-radius:1px;background:#55534c;flex:none"></span>
          {{ buriedGrains }} grains recorded below
        </div>

        <div style="margin-top:auto;display:flex;flex-direction:column;gap:12px">
          <div style="background:#161619;border-radius:4px;padding:13px 14px;color:#e8e6df;font-size:12px;line-height:1.55">
            type anywhere to pour <span style="color:#e0a24e;font-weight:700">amber</span><span style="display:inline-block;width:7px;height:13px;background:#e0a24e;margin-left:3px;vertical-align:-2px;animation:blink 1.1s steps(1) infinite"></span><br>drag the bottle to dig through what's settled
          </div>
          <button onClick="{{ reset }}" style="font-family:inherit;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#8a887e;background:transparent;border:1px solid #e0ded6;border-radius:4px;padding:9px 12px;cursor:pointer" style-hover="background:#f0efe9;color:#55534c">empty the bottle</button>
        </div>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  W = 90;
  viewRows = 140;   // rows visible in the canvas (140 * S = 560px)
  S = 4;
  activeH = 200;    // physics-simulated grid height (taller than the view)
  grid = new Uint8Array(90 * 200);
  frozen = [];      // settled blocks below the active sim: Uint8Array(BAND*W) each, oldest first
  BAND = 16;        // rows per recorded block
  FREEZE_AT = 40;   // freeze a block once the pile peak climbs above this active row
  HEADROOM = 36;    // rows of air kept above the surface when following
  buriedGrainCount = 0;
  ARTIFACT_BASE = 6;   // grid values >= this are rigid artifact pixels (never flow)
  artifacts = [];
  fallingArtifact = null;

  cameraY = 60;     // world row at top of viewport (float, smooth)
  follow = true;
  drag = null;

  // index 0 = empty, 1..4 = users
  usersData = [
    { name: 'You',  you: true,  x: 22, count: 0, queue: 0, rgb: [224,162,78],  css: '#e0a24e' },
    { name: 'Mina', you: false, x: 42, count: 0, queue: 0, rgb: [70,182,166],  css: '#46b6a6', active: 0.8,  burst: 1 },
    { name: 'Theo', you: false, x: 60, count: 0, queue: 0, rgb: [156,130,221], css: '#9c82dd', active: 0.5,  burst: 1 },
    { name: 'Ren',  you: false, x: 76, count: 0, queue: 0, rgb: [222,110,146], css: '#de6e92', active: 0.28, burst: 1 },
  ];
  state = { n: 0 };
  frame = 0;

  setCanvas = (el) => { if (el && el !== this.canvas) this.canvas = el; };
  setThumb = (el) => { this.thumbEl = el; };

  reset = () => {
    this.grid.fill(0);
    this.frozen = [];
    this.buriedGrainCount = 0;
    this.cameraY = this.activeH - this.viewRows;
    this.follow = true;
    this.fallingArtifact = null;
    this.usersData.forEach(u => { u.count = 0; u.queue = 0; });
    this.seed();
    this.setState(s => ({ n: (s.n || 0) + 1 }));
  };

  goLive = () => { this.follow = true; this.forceUpdate(); };

  maxCameraY() { return Math.max(0, this.activeH + this.frozen.length * this.BAND - this.viewRows); }

  startDrag = (e) => {
    e.preventDefault();
    this.drag = { y: e.clientY, cam: this.cameraY };
    this.follow = false;
    if (this.canvas) this.canvas.style.cursor = 'grabbing';
    this.forceUpdate();
  };
  onMove = (e) => {
    if (!this.drag) return;
    const dy = (e.clientY - this.drag.y) / this.S; // drag down -> camera goes deeper
    this.cameraY = Math.min(this.maxCameraY(), Math.max(0, this.drag.cam + dy));
  };
  onUp = () => {
    if (!this.drag) return;
    this.drag = null;
    if (this.canvas) this.canvas.style.cursor = 'grab';
    const liveT = this.followTarget();
    if (this.cameraY <= liveT + 12) this.follow = true; // released near the surface -> resume
    this.forceUpdate();
  };

  surface() {
    // peak of the pile that is connected to the floor — walk each column up
    // from the bottom to the first gap, so falling grains in mid-air don't count
    const { grid, W, activeH } = this;
    let peak = activeH;
    for (let x = 0; x < W; x++) {
      let y = activeH - 1;
      while (y >= 0 && grid[y * W + x]) y--;
      const top = y + 1;
      if (top < peak) peak = top;
    }
    return peak;
  }
  followTarget() {
    return Math.min(this.maxCameraY(), Math.max(0, this.surface() - this.HEADROOM));
  }

  onKey = (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const k = e.key;
    const ok = k.length === 1 || k === 'Enter' || k === 'Backspace' || k === ' ' || k === 'Tab';
    if (!ok) return;
    if (k === 'Tab') e.preventDefault();
    const you = this.usersData[0];
    you.count++;
    you.queue = Math.min(you.queue + 1, 400);
  };

  componentDidMount() {
    this.palU32 = [0];
    for (const u of this.usersData) {
      const [r, g, b] = u.rgb;
      this.palU32.push(((255 << 24) | (b << 16) | (g << 8) | r) >>> 0);
    }
    this.buildArtifacts();
    // viewport compositing buffer (a bit taller than the view for sub-pixel scroll)
    this.view = document.createElement('canvas');
    this.view.width = this.W; this.view.height = this.viewRows + 2;
    this.vctx = this.view.getContext('2d');
    this.vimg = this.vctx.createImageData(this.W, this.viewRows + 2);
    this.vbuf = new Uint32Array(this.vimg.data.buffer);

    this.seed();

    window.addEventListener('keydown', this.onKey);
    window.addEventListener('pointermove', this.onMove);
    window.addEventListener('pointerup', this.onUp);
    const loop = () => { this.tick(); this.raf = requestAnimationFrame(loop); };
    this.raf = requestAnimationFrame(loop);
  }
  componentWillUnmount() {
    window.removeEventListener('keydown', this.onKey);
    window.removeEventListener('pointermove', this.onMove);
    window.removeEventListener('pointerup', this.onUp);
    cancelAnimationFrame(this.raf);
  }

  seed() {
    const { W, grid, activeH } = this;
    const tally = [0, 0, 0, 0, 0];
    const weighted = [2, 2, 2, 2, 3, 3, 3, 4, 4];
    for (let y = activeH - 26; y < activeH; y++) {
      for (let x = 0; x < W; x++) {
        if (Math.random() < 0.93) {
          const c = weighted[(Math.random() * weighted.length) | 0];
          grid[y * W + x] = c; tally[c]++;
        }
      }
    }
    this.usersData[1].count = Math.round(tally[2] / 2);
    this.usersData[2].count = Math.round(tally[3] / 2);
    this.usersData[3].count = Math.round(tally[4] / 2);
  }

  tick() {
    if (!this.canvas) return;
    if (!this.ctx) { this.ctx = this.canvas.getContext('2d'); this.ctx.imageSmoothingEnabled = false; }
    this.frame++;

    if (this.frame % 16 === 0) {
      for (let i = 1; i < this.usersData.length; i++) {
        const u = this.usersData[i];
        if (Math.random() < u.active) { u.count += u.burst; u.queue = Math.min(u.queue + u.burst * 2, 400); }
      }
    }

    this.physics();
    this.maybeFreeze();
    this.spawn();
    this.updateArtifact();

    // smooth camera toward the surface when following
    if (this.follow) {
      const t = this.followTarget();
      this.cameraY += (t - this.cameraY) * 0.16;
      if (Math.abs(t - this.cameraY) < 0.05) this.cameraY = t;
    }
    this.cameraY = Math.min(this.maxCameraY(), Math.max(0, this.cameraY));

    this.draw();
    if (this.frame % 12 === 0) this.setState(s => ({ n: (s.n || 0) + 1 }));
  }

  physics() {
    const { activeH, W } = this;
    const ltr = (this.frame & 1) === 0;
    for (let y = activeH - 2; y >= 0; y--) {
      if (ltr) { for (let x = 0; x < W; x++) this.fall(x, y); }
      else { for (let x = W - 1; x >= 0; x--) this.fall(x, y); }
    }
  }
  fall(x, y) {
    const { grid, W } = this;
    const i = y * W + x;
    const c = grid[i];
    if (!c) return;
    if (c >= this.ARTIFACT_BASE) return; // rigid artifact pixels never flow
    const below = i + W;
    if (grid[below] === 0) { grid[below] = c; grid[i] = 0; return; }
    const dl = x > 0 && grid[below - 1] === 0;
    const dr = x < W - 1 && grid[below + 1] === 0;
    if (dl && dr) { if (Math.random() < 0.5) grid[below - 1] = c; else grid[below + 1] = c; grid[i] = 0; }
    else if (dl) { grid[below - 1] = c; grid[i] = 0; }
    else if (dr) { grid[below + 1] = c; grid[i] = 0; }
  }

  maybeFreeze() {
    const { grid, W, activeH, BAND } = this;
    if (this.surface() > this.FREEZE_AT) return;
    // bottom band must be well settled
    let filled = 0;
    for (let y = activeH - BAND; y < activeH; y++) {
      const base = y * W;
      for (let x = 0; x < W; x++) if (grid[base + x]) filled++;
    }
    if (filled < BAND * W * 0.5) return;

    // record the band's EXACT pixel pattern as a discrete block
    const block = new Uint8Array(BAND * W);
    block.set(grid.subarray((activeH - BAND) * W, activeH * W));
    this.frozen.push(block);
    this.buriedGrainCount += filled;

    // drop active content down so the surface descends; compensate the camera so nothing jumps
    grid.copyWithin(BAND * W, 0, (activeH - BAND) * W);
    grid.fill(0, 0, BAND * W);
    this.cameraY += BAND;
    if (this.drag) this.drag.cam += BAND;
  }

  columnSurface(gx) {
    const { grid, W, activeH } = this;
    if (gx < 0 || gx >= W) return activeH;
    let y = activeH - 1;
    while (y >= 0 && grid[y * W + gx]) y--;
    return y + 1;
  }

  dropArtifact(i) {
    if (this.fallingArtifact || !this.artifacts[i]) return;
    const sp = this.artifacts[i];
    const cx = Math.round((this.W - sp.w) / 2 + (Math.random() * 14 - 7));
    const x = Math.max(0, Math.min(this.W - sp.w, cx));
    this.fallingArtifact = { sprite: sp, x, y: 1, vy: 0.6 };
    this.follow = true;
    this.forceUpdate();
  }

  updateArtifact() {
    const a = this.fallingArtifact;
    if (!a) return;
    const sp = a.sprite;
    a.vy = Math.min(a.vy + 0.07, 2.4);
    let limit = Infinity;
    for (const k in sp.colMax) {
      const dx = +k;
      const cs = this.columnSurface(a.x + dx);
      const rest = cs - 1 - sp.colMax[dx];
      if (rest < limit) limit = rest;
    }
    if (limit < 0) limit = 0;
    const ny = a.y + a.vy;
    if (ny >= limit) { this.stampArtifact(a.x, Math.round(limit), sp); this.fallingArtifact = null; }
    else a.y = ny;
  }

  stampArtifact(ax, ay, sp) {
    const { grid, W, activeH } = this;
    for (const p of sp.pixels) {
      const gx = ax + p.dx, gy = ay + p.dy;
      if (gx < 0 || gx >= W || gy < 0 || gy >= activeH) continue;
      grid[gy * W + gx] = p.ci;
    }
  }

  buildArtifacts() {
    const defs = [
      { name: 'Ammonite', swatch: '#c2a06f', map: { o:'#9c7f54', a:'#e7d2a8', r:'#c2a06f' }, rows: [
        '...oooooo...',
        '.oaaraaraao.',
        'oaaraaraaaro',
        'oaraaraaraao',
        'oaaraaraaaao',
        '.oaaraaraao.',
        '..oaaaaaao..',
        '...oaaaao...',
        '....oooo....',
      ]},
      { name: 'Floppy', swatch: '#46566a', map: { D:'#2f3b47', B:'#46566a', S:'#9aa6b2', L:'#e7e4da' }, rows: [
        'DDDDDDDDDDDDDD',
        'DBBBBBBBBBBBSD',
        'DBBBBBBBBBBBSD',
        'DBSSSSSSSSBBSD',
        'DBSSSSSSSSBBBD',
        'DBBBBBBBBBBBBD',
        'DBBBBBBBBBBBBD',
        'DBLLLLLLLLLLBD',
        'DBLLLLLLLLLLBD',
        'DBLLLLLLLLLLBD',
        'DBLLLLLLLLLLBD',
        'DBLLLLLLLLLLBD',
        'DBBBBBBBBBBBBD',
        'DDDDDDDDDDDDDD',
      ]},
      { name: 'Bulb', swatch: '#f3d579', map: { G:'#f3d579', H:'#fdeeb0', F:'#e08a2c', M:'#8f8678', K:'#6c6456' }, rows: [
        '.....GGGG.....',
        '...GGGGGGGG...',
        '..GGGGGGGGGG..',
        '.GGGGGGGGGGGG.',
        '.GGGHHGGGGGGG.',
        '.GGGGGGGGGGGG.',
        '.GGGGGFFGGGGG.',
        '..GGGGFFGGGG..',
        '..GGGGGGGGGG..',
        '...MMMMMMMM...',
        '...KMMMMMMK...',
        '....MMMMMM....',
        '....KMMMMK....',
        '.....MMMM.....',
      ]},
    ];
    while (this.palU32.length < this.ARTIFACT_BASE) this.palU32.push(0);
    const hexIndex = {};
    const pack = (h) => {
      const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
      return ((255 << 24) | (b << 16) | (g << 8) | r) >>> 0;
    };
    this.artifacts = defs.map(def => {
      const pixels = []; let w = 0; const colMax = {};
      def.rows.forEach((row, dy) => {
        for (let dx = 0; dx < row.length; dx++) {
          const ch = row[dx];
          if (ch === '.' || ch === ' ') continue;
          const hex = def.map[ch];
          let idx = hexIndex[hex];
          if (idx == null) { idx = this.palU32.length; hexIndex[hex] = idx; this.palU32.push(pack(hex)); }
          pixels.push({ dx, dy, ci: idx, css: hex });
          if (dx + 1 > w) w = dx + 1;
          if (colMax[dx] == null || dy > colMax[dx]) colMax[dx] = dy;
        }
      });
      return { name: def.name, swatch: def.swatch, pixels, w, h: def.rows.length, colMax };
    });
  }

  spawn() {
    const { grid, W } = this;
    const offs = [0, -1, 1, -2, 2];
    for (let ui = 0; ui < this.usersData.length; ui++) {
      const u = this.usersData[ui];
      const color = ui + 1;
      let release = Math.min(u.queue, 2);
      while (release > 0) {
        let placed = false;
        for (const o of offs) {
          const xx = u.x + o;
          if (xx < 0 || xx >= W) continue;
          if (grid[xx] === 0) { grid[xx] = color; placed = true; break; }
        }
        if (!placed) break;
        u.queue--; release--;
      }
    }
  }

  buildView() {
    const { W, viewRows, vbuf, grid, activeH, frozen, BAND } = this;
    const start = Math.floor(this.cameraY);
    const rows = viewRows + 2;
    const nf = frozen.length;
    vbuf.fill(0);
    for (let sr = 0; sr < rows; sr++) {
      const wy = start + sr;
      if (wy < 0) continue;
      let src, base;
      if (wy < activeH) { src = grid; base = wy * W; }
      else {
        const off = wy - activeH;
        const fromTop = (off / BAND) | 0;
        const idx = nf - 1 - fromTop;
        if (idx < 0 || idx >= nf) continue;
        src = frozen[idx]; base = (off - fromTop * BAND) * W;
      }
      const o = sr * W;
      for (let x = 0; x < W; x++) { const c = src[base + x]; if (c) vbuf[o + x] = this.palU32[c]; }
    }
    this.vctx.putImageData(this.vimg, 0, 0);
  }

  draw() {
    const { ctx, W, S, viewRows } = this;
    this.buildView();
    const frac = this.cameraY - Math.floor(this.cameraY);
    ctx.fillStyle = '#161619';
    ctx.fillRect(0, 0, W * S, viewRows * S);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(this.view, 0, 0, W, viewRows + 2, 0, -frac * S, W * S, (viewRows + 2) * S);

    // pour spouts (only meaningful near the live surface)
    if (this.cameraY < 24) {
      for (const u of this.usersData) {
        const sy = Math.max(0, (0 - this.cameraY) * S);
        ctx.fillStyle = u.css;
        ctx.fillRect(u.x * S - 2, sy, S + 4, 3);
      }
    }

    // falling artifact (drawn over the sand while it descends through the air)
    if (this.fallingArtifact) {
      const a = this.fallingArtifact, sp = a.sprite;
      for (const p of sp.pixels) {
        const sx = (a.x + p.dx) * S;
        const sy = ((a.y + p.dy) - this.cameraY) * S;
        if (sy < -S || sy > viewRows * S) continue;
        ctx.fillStyle = p.css;
        ctx.fillRect(Math.round(sx), Math.round(sy), S, S);
      }
    }

    // scroll thumb
    if (this.thumbEl) {
      const worldRows = this.activeH + this.frozen.length * this.BAND;
      const visFrac = Math.min(1, viewRows / worldRows);
      const hPct = Math.max(8, visFrac * 100);
      const denom = this.maxCameraY();
      const pos = denom > 0 ? this.cameraY / denom : 0;
      this.thumbEl.style.height = hPct + '%';
      this.thumbEl.style.top = (pos * (100 - hPct)) + '%';
    }
  }

  renderVals() {
    const max = Math.max(1, ...this.usersData.map(u => u.count));
    const users = this.usersData.map(u => ({
      name: u.name,
      count: u.count.toLocaleString(),
      pct: Math.max(3, Math.round((u.count / max) * 100)),
      color: u.css,
      role: u.you ? 'you' : 'teammate',
      rowBg: u.you ? 'rgba(224,162,78,0.10)' : 'transparent',
    }));
    const total = this.usersData.reduce((a, u) => a + u.count, 0).toLocaleString();
    const artItems = this.artifacts.map((a, i) => ({ name: a.name, css: a.swatch, drop: () => this.dropArtifact(i) }));
    return {
      setCanvas: this.setCanvas, setThumb: this.setThumb,
      reset: this.reset, goLive: this.goLive, startDrag: this.startDrag,
      users, total, artItems,
      browsing: !this.follow,
      buriedGrains: this.buriedGrainCount.toLocaleString(),
    };
  }
}
</script>
</body>
</html>
