<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time in the Bottle</title>

<!-- Overlay mode: when the Tauri shell loads this page the URL carries #overlay.
     The whole thing then floats on the desktop like a Bongo-Cat sticker — the
     workbench backdrop goes transparent and only the (semi-transparent) bottle
     and its little control bar paint. In a plain browser (no #overlay) we keep a
     warm backdrop so the floating bottle stays visible for dev. -->
<script>
  if (location.hash.indexOf("overlay") !== -1) {
    document.documentElement.classList.add("overlay");
  }
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  /* ----------------------------------------------------------------
     Time in the Bottle — a desktop-pet overlay. Keystrokes fall as coloured
     pixel sand into a semi-transparent bottle floating on the desktop; sand
     piles up, freezes into 16px history bands, and can be dug back up.
     Pure HTML/CSS/vanilla JS — no framework, no build step (CLAUDE.md §5).

     Form factor: the bottle is the body (drag it to dig); a thin bar below
     carries your keystroke count + a ≡ menu (drag the bar to move the window).
  ---------------------------------------------------------------- */

  :root {
    /* identity colours (sand + ranking) */
    --color-user-you: #e0a24e;
    --color-user-1:   #46b6a6;
    --color-user-2:   #9c82dd;
    --color-user-3:   #de6e92;
    --color-accent:   #e0a24e;

    /* floating chrome (bar + menu) — dark translucent so it stays legible on
       any wallpaper, matching the frosted bottle */
    --chrome-bg:      rgba(22,22,25,.78);
    --chrome-border:  rgba(255,255,255,.10);
    --chrome-text:    #e8e6df;
    --chrome-weak:    #a09e94;
    --chrome-divider: rgba(255,255,255,.08);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: #e7e5df;            /* browser-only backdrop */
    color: var(--chrome-text);
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }

  /* Overlay mode (Tauri shell): desktop shows through; only bottle + bar paint. */
  html.overlay, html.overlay body {
    background: transparent !important;
    overflow: hidden;
  }

  .workbench {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
    user-select: none;
    -webkit-user-select: none;
  }

  .pet { position: relative; display: flex; flex-direction: column; gap: 8px; }

  /* ---- the bottle ----------------------------------------------------- */
  .bottle-wrap { position: relative; width: 360px; height: 560px; }

  canvas#bottle {
    display: block;
    width: 360px; height: 560px;
    background: transparent;                 /* the tint is painted inside the canvas */
    border: none;                            /* no frame — reads as "just sand", more pet-like */
    border-radius: 8px;
    image-rendering: pixelated;
    cursor: grab;
    touch-action: none;
    box-shadow: 0 10px 34px rgba(0,0,0,.34);
    backdrop-filter: blur(2px);              /* progressive: frosts the desktop where supported */
    -webkit-backdrop-filter: blur(2px);
  }
  canvas#bottle.grabbing { cursor: grabbing; }

  .scrollbar {
    display: none;                /* hidden per design — drag the bottle to scroll */
    position: absolute;
    top: 8px; right: 8px; bottom: 8px;
    width: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,.06);
  }
  .thumb {
    position: absolute;
    left: 0; width: 100%;
    top: 0; height: 30%;
    border-radius: 2px;
    background: rgba(255,255,255,.28);
  }

  .surface-btn {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #161619;
    background: var(--color-accent);
    border: none;
    border-radius: 20px;
    padding: 7px 15px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.35);
  }
  .surface-btn[hidden] { display: none; }

  /* ---- bottom bar (drag handle: moves the window) --------------------- */
  .bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 8px 7px 12px;
    background: var(--chrome-bg);
    border: 1px solid var(--chrome-border);
    border-radius: 8px;
    cursor: grab;
    box-shadow: 0 6px 20px rgba(0,0,0,.3);
  }
  .bar:active { cursor: grabbing; }
  .bar-stats { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--color-user-1);
    flex: none;
    animation: blink 2.4s infinite;
  }
  /* not connected to a room server: grey + no blink (honest status indicator) */
  .live-dot.off { background: #6b6b6b; animation: none; }
  #barCount { font-weight: 700; color: var(--chrome-text); }
  .bar-unit {
    font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--chrome-weak);
  }
  .menu-btn {
    flex: none;
    font-family: inherit;
    font-size: 15px; line-height: 1;
    color: var(--chrome-text);
    background: rgba(255,255,255,.06);
    border: 1px solid var(--chrome-border);
    border-radius: 6px;
    width: 30px; height: 26px;
    padding: 0;
    cursor: pointer;
  }
  .menu-btn:hover { background: rgba(255,255,255,.12); }

  /* ---- menu (pops above the bar) ------------------------------------- */
  .menu {
    position: absolute;
    right: 0; bottom: 46px;
    width: 244px;
    background: var(--chrome-bg);
    border: 1px solid var(--chrome-border);
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
    padding: 12px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 5;
  }
  .menu[hidden] { display: none; }

  .menu-label {
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--chrome-weak);
  }
  .ranking { display: flex; flex-direction: column; gap: 10px; }
  .rank-row { display: flex; flex-direction: column; gap: 5px; }
  .rank-head { display: flex; align-items: center; gap: 8px; }
  .rank-swatch { width: 9px; height: 9px; border-radius: 2px; flex: none; }
  .rank-name { font-size: 12px; color: var(--chrome-text); flex: 1; }
  .rank-role {
    font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--chrome-weak);
  }
  .rank-count { font-size: 11.5px; font-weight: 700; color: var(--chrome-text); min-width: 42px; text-align: right; }
  .rank-bar { height: 4px; border-radius: 3px; background: rgba(255,255,255,.10); overflow: hidden; }
  .rank-bar > i { display: block; height: 100%; width: 0%; border-radius: 3px; transition: width .3s ease; }

  .menu-buried { font-size: 10.5px; color: var(--chrome-weak); display: flex; align-items: center; gap: 7px; }
  .buried-dot { width: 6px; height: 6px; border-radius: 1px; background: var(--chrome-weak); flex: none; }

  .menu-sep { height: 1px; background: var(--chrome-divider); }

  .menu-item {
    font-family: inherit;
    font-size: 11px; letter-spacing: .04em;
    text-align: left;
    color: var(--chrome-text);
    background: transparent;
    border: none;
    border-radius: 5px;
    padding: 8px 9px;
    cursor: pointer;
  }
  .menu-item:hover { background: rgba(255,255,255,.08); }
  .menu-item.danger { color: var(--color-user-3); }
  .menu-room { color: var(--color-accent); font-weight: 700; letter-spacing: .08em; }
  .menu-edit { display: flex; gap: 6px; padding: 2px 0; }
  .menu-edit[hidden] { display: none; }
  .menu-edit input {
    flex: 1; min-width: 0;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--chrome-border);
    border-radius: 5px;
    color: var(--chrome-text);
    font-family: inherit; font-size: 12px;
    padding: 6px 8px;
  }
  .menu-edit input:focus { outline: none; border-color: var(--color-accent); }
  .menu-edit button {
    flex: none;
    font-family: inherit; font-size: 11px;
    color: #161619; background: var(--color-accent);
    border: none; border-radius: 5px;
    padding: 0 12px; cursor: pointer;
  }

  @keyframes blink { 0%,55% { opacity: 1; } 56%,100% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    .live-dot { animation: none !important; }
    .rank-bar > i { transition: none !important; }
  }
</style>
</head>
<body>

  <div class="workbench" id="workbench">
    <div class="pet" id="pet">

      <!-- BODY · the bottle (drag to dig) ----------------------------- -->
      <div class="bottle-wrap">
        <canvas id="bottle" width="360" height="560" data-no-drag aria-label="瓶子"></canvas>
        <div class="scrollbar"><div class="thumb" id="thumb"></div></div>
        <button class="surface-btn" id="surfaceBtn" data-no-drag hidden>↑ back to surface</button>
      </div>

      <!-- BAR · stats + menu (drag to move the window) ---------------- -->
      <div class="bar" id="bar">
        <div class="bar-stats">
          <span class="live-dot off" id="liveDot"></span>
          <span id="barCount">0</span>
          <span class="bar-unit">keystrokes</span>
        </div>
        <button class="menu-btn" id="menuBtn" data-no-drag aria-haspopup="true" aria-label="菜单">≡</button>
      </div>

      <!-- MENU (hidden until ≡) -------------------------------------- -->
      <div class="menu" id="menu" data-no-drag hidden>
        <div class="menu-label">who's pouring</div>
        <div class="ranking" id="ranking"></div>
        <div class="menu-buried"><span class="buried-dot"></span><span id="buriedText">0</span>&nbsp;grains recorded below</div>

        <div class="menu-sep"></div>
        <div class="menu-label">room <span class="menu-room">#<span id="roomCode">----</span></span></div>
        <button class="menu-item" id="newRoomBtn">new room</button>
        <button class="menu-item" id="joinRoomBtn">join room…</button>
        <button class="menu-item" id="copyLinkBtn">copy invite link</button>
        <button class="menu-item" id="nameBtn">nickname…</button>
        <div class="menu-edit" id="editRow" hidden>
          <input id="editInput" type="text" autocomplete="off" spellcheck="false">
          <button id="editSave">ok</button>
        </div>

        <div class="menu-sep"></div>
        <button class="menu-item" id="resetBtn">empty the bottle</button>
        <button class="menu-item danger" id="exitBtn">exit</button>
      </div>

    </div>
  </div>

<script>
(function () {
  "use strict";

  const $ = function (id) { return document.getElementById(id); };

  // --- DOM handles ---
  const workbench  = $("workbench");
  const canvas     = $("bottle");
  const thumbEl    = $("thumb");
  const surfaceBtn = $("surfaceBtn");
  const bar        = $("bar");
  const menuBtn    = $("menuBtn");
  const menu       = $("menu");
  const resetBtn   = $("resetBtn");
  const exitBtn    = $("exitBtn");
  const rankingEl  = $("ranking");
  const barCount   = $("barCount");
  const liveDot    = $("liveDot");
  const buriedText = $("buriedText");
  const roomCodeEl = $("roomCode");
  const newRoomBtn = $("newRoomBtn");
  const joinRoomBtn= $("joinRoomBtn");
  const copyLinkBtn= $("copyLinkBtn");
  const nameBtn    = $("nameBtn");
  const editRow    = $("editRow");
  const editInput  = $("editInput");
  const editSave   = $("editSave");

  // Tauri APIs exist only inside the shell. Guarded so the page also runs in a
  // plain browser. The shell feeds a global input *count* via the 'keycount'
  // event (counting happens only in Rust — CLAUDE.md §3); the webview never
  // reads global input itself.
  const TW        = window.__TAURI__ && window.__TAURI__.window;
  const TE        = window.__TAURI__ && window.__TAURI__.event;
  const appWindow = TW ? TW.getCurrentWindow() : null;

  // Demo flag (?demo): seeds the bottle and simulates teammates so the full
  // four-colour look can be eyeballed without a room. Never on the real path.
  const params   = new URLSearchParams(location.search);
  const demoMode = params.has("demo");

  // ---------------------------------------------------------------------------
  // Identity palette. Grid cells hold a slot index (1..4); 0 = empty. The four
  // identity colours are fixed regardless of how many people are pouring, so a
  // given slot always renders the same hue. (Stage 2: >4 players recycle 2..4.)
  // ---------------------------------------------------------------------------
  const USER_COLORS = [
    { css: "#e0a24e", rgb: [224, 162, 78]  }, // slot 1 — you (amber)
    { css: "#46b6a6", rgb: [70, 182, 166]  }, // slot 2 — teal
    { css: "#9c82dd", rgb: [156, 130, 221] }, // slot 3 — violet
    { css: "#de6e92", rgb: [222, 110, 146] }, // slot 4 — rose
  ];

  // --- sand-engine constants (Doc/frontend.md · sand spec) ---
  const W         = 90;    // grid columns
  const S         = 4;     // pixels per cell
  const viewRows  = 140;   // visible rows (140 * 4 = 560px)
  const activeH   = 200;   // simulated grid height (taller than the view)
  const BAND      = 16;    // rows per frozen history block
  const FREEZE_AT = 40;    // freeze once the pile peak climbs above this row
  const HEADROOM  = 36;    // air rows kept above the surface while following
  const ARTIFACT_BASE = 6; // grid values >= this are rigid artifact pixels
  const WELL_TINT = "rgba(22,22,25,0.42)"; // semi-transparent well (desktop shows through)

  // --- engine state ---
  const grid = new Uint8Array(W * activeH);
  let frozen = [];            // settled blocks below the active sim (oldest first)
  let buriedGrainCount = 0;
  let cameraY = activeH - viewRows; // world row at the top of the viewport (float)
  let follow = true;
  let drag = null;
  let frame = 0;
  let palU32 = [];
  let artifacts = [];
  let fallingArtifact = null;
  let youBaselineSet = false; // first keycount sets a baseline (no grain dump)
  let pendingTicks = null;    // latest cumulative ticks awaiting report to the room

  // Active pourers. Stage 1: just You. Each entry maps to one identity slot.
  const you = {
    id: "you", name: "You", you: true, slot: 1, x: 45,
    count: 0, queue: 0,
    css: USER_COLORS[0].css,
  };
  const users = [you];

  // offscreen compositing buffer (a touch taller than the view for sub-pixel scroll)
  const view = document.createElement("canvas");
  view.width = W; view.height = viewRows + 2;
  const vctx = view.getContext("2d");
  const vimg = vctx.createImageData(W, viewRows + 2);
  const vbuf = new Uint32Array(vimg.data.buffer);

  let ctx = null;

  // ---------------------------------------------------------------------------
  // Palette: [empty, 4 user colours, pad to ARTIFACT_BASE, ...artifact colours]
  // ---------------------------------------------------------------------------
  function packRGB(r, g, b) { return ((255 << 24) | (b << 16) | (g << 8) | r) >>> 0; }
  function packHex(h) {
    return packRGB(parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16));
  }
  function buildPalette() {
    palU32 = [0];
    for (const u of USER_COLORS) palU32.push(packRGB(u.rgb[0], u.rgb[1], u.rgb[2]));
    while (palU32.length < ARTIFACT_BASE) palU32.push(0);
  }

  // ---------------------------------------------------------------------------
  // Artifacts (Ammonite / Floppy / Bulb): rigid pixel sprites that drop in and
  // get buried — the concrete form the Stage 3 achievement system will use.
  // Engine ported now; in demo mode one drops on a timer so it stays exercised,
  // and dropArtifact() is the hook Stage 3 will call on a milestone.
  // ---------------------------------------------------------------------------
  function buildArtifacts() {
    const defs = [
      { name: "Ammonite", map: { o: "#9c7f54", a: "#e7d2a8", r: "#c2a06f" }, rows: [
        "...oooooo...", ".oaaraaraao.", "oaaraaraaaro", "oaraaraaraao",
        "oaaraaraaaao", ".oaaraaraao.", "..oaaaaaao..", "...oaaaao...", "....oooo....",
      ]},
      { name: "Floppy", map: { D: "#2f3b47", B: "#46566a", S: "#9aa6b2", L: "#e7e4da" }, rows: [
        "DDDDDDDDDDDDDD", "DBBBBBBBBBBBSD", "DBBBBBBBBBBBSD", "DBSSSSSSSSBBSD",
        "DBSSSSSSSSBBBD", "DBBBBBBBBBBBBD", "DBBBBBBBBBBBBD", "DBLLLLLLLLLLBD",
        "DBLLLLLLLLLLBD", "DBLLLLLLLLLLBD", "DBLLLLLLLLLLBD", "DBLLLLLLLLLLBD",
        "DBBBBBBBBBBBBD", "DDDDDDDDDDDDDD",
      ]},
      { name: "Bulb", map: { G: "#f3d579", H: "#fdeeb0", F: "#e08a2c", M: "#8f8678", K: "#6c6456" }, rows: [
        ".....GGGG.....", "...GGGGGGGG...", "..GGGGGGGGGG..", ".GGGGGGGGGGGG.",
        ".GGGHHGGGGGGG.", ".GGGGGGGGGGGG.", ".GGGGGFFGGGGG.", "..GGGGFFGGGG..",
        "..GGGGGGGGGG..", "...MMMMMMMM...", "...KMMMMMMK...", "....MMMMMM....",
        "....KMMMMK....", ".....MMMM.....",
      ]},
    ];
    const hexIndex = {};
    artifacts = defs.map(function (def) {
      const pixels = []; let w = 0; const colMax = {};
      def.rows.forEach(function (row, dy) {
        for (let dx = 0; dx < row.length; dx++) {
          const ch = row[dx];
          if (ch === "." || ch === " ") continue;
          const hex = def.map[ch];
          let idx = hexIndex[hex];
          if (idx == null) { idx = palU32.length; hexIndex[hex] = idx; palU32.push(packHex(hex)); }
          pixels.push({ dx: dx, dy: dy, ci: idx, css: hex });
          if (dx + 1 > w) w = dx + 1;
          if (colMax[dx] == null || dy > colMax[dx]) colMax[dx] = dy;
        }
      });
      return { name: def.name, pixels: pixels, w: w, h: def.rows.length, colMax: colMax };
    });
  }

  function dropArtifact(i) {
    if (fallingArtifact || !artifacts[i]) return;
    const sp = artifacts[i];
    const cx = Math.round((W - sp.w) / 2 + (Math.random() * 14 - 7));
    const x = Math.max(0, Math.min(W - sp.w, cx));
    fallingArtifact = { sprite: sp, x: x, y: 1, vy: 0.6 };
    follow = true;
  }

  // ---------------------------------------------------------------------------
  // Camera helpers
  // ---------------------------------------------------------------------------
  function maxCameraY() { return Math.max(0, activeH + frozen.length * BAND - viewRows); }

  function surface() {
    // peak of the pile connected to the floor: walk each column up from the
    // bottom to the first gap, so grains still in mid-air don't count.
    let peak = activeH;
    for (let x = 0; x < W; x++) {
      let y = activeH - 1;
      while (y >= 0 && grid[y * W + x]) y--;
      const top = y + 1;
      if (top < peak) peak = top;
    }
    return peak;
  }
  function columnSurface(gx) {
    if (gx < 0 || gx >= W) return activeH;
    let y = activeH - 1;
    while (y >= 0 && grid[y * W + gx]) y--;
    return y + 1;
  }
  function followTarget() {
    return Math.min(maxCameraY(), Math.max(0, surface() - HEADROOM));
  }

  // ---------------------------------------------------------------------------
  // Physics: per-row gravity + random diagonal slide, scan direction alternating
  // each frame to avoid a sideways drift.
  // ---------------------------------------------------------------------------
  function physics() {
    const ltr = (frame & 1) === 0;
    for (let y = activeH - 2; y >= 0; y--) {
      if (ltr) { for (let x = 0; x < W; x++) fall(x, y); }
      else     { for (let x = W - 1; x >= 0; x--) fall(x, y); }
    }
  }
  function fall(x, y) {
    const i = y * W + x;
    const c = grid[i];
    if (!c) return;
    if (c >= ARTIFACT_BASE) return; // rigid artifact pixels never flow
    const below = i + W;
    if (grid[below] === 0) { grid[below] = c; grid[i] = 0; return; }
    const dl = x > 0 && grid[below - 1] === 0;
    const dr = x < W - 1 && grid[below + 1] === 0;
    if (dl && dr) { if (Math.random() < 0.5) grid[below - 1] = c; else grid[below + 1] = c; grid[i] = 0; }
    else if (dl)  { grid[below - 1] = c; grid[i] = 0; }
    else if (dr)  { grid[below + 1] = c; grid[i] = 0; }
  }

  function maybeFreeze() {
    if (surface() > FREEZE_AT) return;
    let filled = 0;
    for (let y = activeH - BAND; y < activeH; y++) {
      const base = y * W;
      for (let x = 0; x < W; x++) if (grid[base + x]) filled++;
    }
    if (filled < BAND * W * 0.5) return; // band must be well settled

    const block = new Uint8Array(BAND * W);
    block.set(grid.subarray((activeH - BAND) * W, activeH * W));
    frozen.push(block);
    buriedGrainCount += filled;

    // drop active content down so the surface descends; compensate the camera
    grid.copyWithin(BAND * W, 0, (activeH - BAND) * W);
    grid.fill(0, 0, BAND * W);
    cameraY += BAND;
    if (drag) drag.cam += BAND;
  }

  function spawn() {
    const offs = [0, -1, 1, -2, 2];
    for (const u of users) {
      let release = Math.min(u.queue, 2);
      while (release > 0) {
        let placed = false;
        for (const o of offs) {
          const xx = u.x + o;
          if (xx < 0 || xx >= W) continue;
          if (grid[xx] === 0) { grid[xx] = u.slot; placed = true; break; }
        }
        if (!placed) break;
        u.queue--; release--;
      }
    }
  }

  function updateArtifact() {
    const a = fallingArtifact;
    if (!a) return;
    const sp = a.sprite;
    a.vy = Math.min(a.vy + 0.07, 2.4);
    let limit = Infinity;
    for (const k in sp.colMax) {
      const dx = +k;
      const rest = columnSurface(a.x + dx) - 1 - sp.colMax[dx];
      if (rest < limit) limit = rest;
    }
    if (limit < 0) limit = 0;
    const ny = a.y + a.vy;
    if (ny >= limit) { stampArtifact(a.x, Math.round(limit), sp); fallingArtifact = null; }
    else a.y = ny;
  }
  function stampArtifact(ax, ay, sp) {
    for (const p of sp.pixels) {
      const gx = ax + p.dx, gy = ay + p.dy;
      if (gx < 0 || gx >= W || gy < 0 || gy >= activeH) continue;
      grid[gy * W + gx] = p.ci;
    }
  }

  // ---------------------------------------------------------------------------
  // Render
  // ---------------------------------------------------------------------------
  function buildView() {
    const start = Math.floor(cameraY);
    const rows = viewRows + 2;
    const nf = frozen.length;
    vbuf.fill(0);
    for (let sr = 0; sr < rows; sr++) {
      const wy = start + sr;
      if (wy < 0) continue;
      let src, base;
      if (wy < activeH) { src = grid; base = wy * W; }
      else {
        const off = wy - activeH;
        const fromTop = (off / BAND) | 0;
        const idx = nf - 1 - fromTop;
        if (idx < 0 || idx >= nf) continue;
        src = frozen[idx]; base = (off - fromTop * BAND) * W;
      }
      const o = sr * W;
      for (let x = 0; x < W; x++) { const c = src[base + x]; if (c) vbuf[o + x] = palU32[c]; }
    }
    vctx.putImageData(vimg, 0, 0);
  }

  function draw() {
    buildView();
    const frac = cameraY - Math.floor(cameraY);
    // semi-transparent well: clear to transparent, then lay a translucent tint
    // so the desktop shows through and the opaque sand pixels read on top.
    ctx.clearRect(0, 0, W * S, viewRows * S);
    ctx.fillStyle = WELL_TINT;
    ctx.fillRect(0, 0, W * S, viewRows * S);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(view, 0, 0, W, viewRows + 2, 0, -frac * S, W * S, (viewRows + 2) * S);

    // pour spouts (only meaningful near the live surface)
    if (cameraY < 24) {
      const sy = Math.max(0, (0 - cameraY) * S);
      for (const u of users) {
        ctx.fillStyle = u.css;
        ctx.fillRect(u.x * S - 2, sy, S + 4, 3);
      }
    }

    // falling artifact drawn over the sand while it descends through the air
    if (fallingArtifact) {
      const a = fallingArtifact, sp = a.sprite;
      for (const p of sp.pixels) {
        const sx = (a.x + p.dx) * S;
        const sy = ((a.y + p.dy) - cameraY) * S;
        if (sy < -S || sy > viewRows * S) continue;
        ctx.fillStyle = p.css;
        ctx.fillRect(Math.round(sx), Math.round(sy), S, S);
      }
    }

    // scroll thumb
    const worldRows = activeH + frozen.length * BAND;
    const visFrac = Math.min(1, viewRows / worldRows);
    const hPct = Math.max(8, visFrac * 100);
    const denom = maxCameraY();
    const pos = denom > 0 ? cameraY / denom : 0;
    thumbEl.style.height = hPct + "%";
    thumbEl.style.top = (pos * (100 - hPct)) + "%";
  }

  // ---------------------------------------------------------------------------
  // Chrome — bar (always) + menu stats (kept fresh while open). Row elements
  // persist (keyed per user) so the progress bars can transition.
  // ---------------------------------------------------------------------------
  function ensureRow(u) {
    if (u.rowEl) return;
    const row = document.createElement("div");
    row.className = "rank-row";
    const head = document.createElement("div"); head.className = "rank-head";
    const sw = document.createElement("span"); sw.className = "rank-swatch"; sw.style.background = u.css;
    const nm = document.createElement("span"); nm.className = "rank-name"; nm.textContent = u.name;
    const role = document.createElement("span"); role.className = "rank-role"; role.textContent = u.you ? "you" : "teammate";
    const cnt = document.createElement("span"); cnt.className = "rank-count"; cnt.textContent = "0";
    head.appendChild(sw); head.appendChild(nm); head.appendChild(role); head.appendChild(cnt);
    const barEl = document.createElement("div"); barEl.className = "rank-bar";
    const fill = document.createElement("i"); fill.style.background = u.css;
    barEl.appendChild(fill);
    row.appendChild(head); row.appendChild(barEl);
    rankingEl.appendChild(row);
    u.rowEl = row; u.countEl = cnt; u.barEl = fill;
  }

  function updateChrome() {
    barCount.textContent = you.count.toLocaleString();
    surfaceBtn.hidden = follow;
    if (menu.hidden) return; // ranking/buried only matter while the menu is open
    let max = 1;
    for (const u of users) if (u.count > max) max = u.count;
    for (const u of users) {
      ensureRow(u);
      u.countEl.textContent = u.count.toLocaleString();
      u.barEl.style.width = Math.max(3, Math.round((u.count / max) * 100)) + "%";
    }
    buriedText.textContent = buriedGrainCount.toLocaleString();
  }

  // ---------------------------------------------------------------------------
  // Main loop
  // ---------------------------------------------------------------------------
  function tick() {
    if (!ctx) { ctx = canvas.getContext("2d"); ctx.imageSmoothingEnabled = false; }
    frame++;

    // demo: simulate teammates pouring + drop an artifact now and then
    if (demoMode && frame % 16 === 0) {
      for (const u of users) {
        if (u.you) continue;
        if (Math.random() < u.active) { u.count += u.burst; u.queue = Math.min(u.queue + u.burst * 2, 400); }
      }
    }
    if (demoMode && frame % 1400 === 0) dropArtifact((Math.random() * artifacts.length) | 0);

    physics();
    maybeFreeze();
    spawn();
    updateArtifact();

    if (follow) {
      const t = followTarget();
      cameraY += (t - cameraY) * 0.16;
      if (Math.abs(t - cameraY) < 0.05) cameraY = t;
    }
    cameraY = Math.min(maxCameraY(), Math.max(0, cameraY));

    draw();
    if (frame % 12 === 0) updateChrome();
    requestAnimationFrame(tick);
  }

  // ---------------------------------------------------------------------------
  // Input · YOU
  //   · Tauri shell  → the global 'keycount' running total (counted in Rust).
  //   · plain browser → the page's own focused keyboard (the reference behaviour;
  //                      not the global hook, just this page — invariant intact).
  // ---------------------------------------------------------------------------
  function applyCount(total) {
    total = Number(total) || 0;
    if (!youBaselineSet) { you.count = total; youBaselineSet = true; pendingTicks = you.count; return; } // no startup dump
    const delta = total - you.count;
    if (delta > 0) { you.count = total; you.queue = Math.min(you.queue + delta, 400); }
    pendingTicks = you.count;
  }
  function bumpYou() { you.count++; you.queue = Math.min(you.queue + 1, 400); pendingTicks = you.count; }

  if (TE) {
    TE.listen("keycount", function (e) { applyCount(e.payload); });
  } else {
    const MODS = { Shift: 1, Control: 1, Alt: 1, Meta: 1, CapsLock: 1 };
    window.addEventListener("keydown", function (e) {
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.target.closest && e.target.closest("input, textarea, button")) return;
      const k = e.key;
      if (MODS[k]) return;
      const ok = k.length === 1 || k === "Enter" || k === "Backspace" || k === " " || k === "Tab";
      if (!ok) return;
      if (k === "Tab") e.preventDefault();
      bumpYou();
    });
  }

  // ---------------------------------------------------------------------------
  // Interaction zones (resolves the dig-vs-move conflict by giving each gesture
  // its own element): the bottle body digs; the bar (+ empty margins) moves the
  // window; buttons opt out of both via [data-no-drag].
  // ---------------------------------------------------------------------------
  // DIG — drag the canvas
  canvas.addEventListener("pointerdown", function (e) {
    e.preventDefault();
    e.stopPropagation(); // never let this also move the window
    drag = { y: e.clientY, cam: cameraY };
    follow = false;
    canvas.classList.add("grabbing");
  });
  window.addEventListener("pointermove", function (e) {
    if (!drag) return;
    const dy = (e.clientY - drag.y) / S; // drag down → camera goes deeper
    cameraY = Math.min(maxCameraY(), Math.max(0, drag.cam + dy));
  });
  window.addEventListener("pointerup", function () {
    if (!drag) return;
    drag = null;
    canvas.classList.remove("grabbing");
    if (cameraY <= followTarget() + 12) follow = true; // released near surface → resume
  });

  // back to surface (return from a dig)
  surfaceBtn.addEventListener("click", function () { follow = true; });

  // MOVE THE WINDOW — drag the bar or any empty (non-canvas, non-button) area
  workbench.addEventListener("pointerdown", function (e) {
    if (e.button !== 0) return;
    if (e.target.closest("canvas, [data-no-drag]")) return;
    if (appWindow) appWindow.startDragging();
  });

  // ---------------------------------------------------------------------------
  // Menu
  // ---------------------------------------------------------------------------
  function closeMenu() { menu.hidden = true; }
  menuBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    menu.hidden = !menu.hidden;
    if (!menu.hidden) updateChrome(); // populate immediately on open
  });
  document.addEventListener("click", function (e) {
    if (!menu.hidden && !menu.contains(e.target) && e.target !== menuBtn) closeMenu();
  });

  resetBtn.addEventListener("click", function () {
    grid.fill(0);
    frozen = [];
    buriedGrainCount = 0;
    cameraY = activeH - viewRows;
    follow = true;
    fallingArtifact = null;
    for (const u of users) { u.count = 0; u.queue = 0; }
    youBaselineSet = false; // re-baseline against the shell's running total
    if (demoMode) seed();
    closeMenu();
    updateChrome();
  });

  exitBtn.addEventListener("click", function () {
    if (appWindow) appWindow.close(); else window.close();
  });

  // ---------------------------------------------------------------------------
  // Multiplayer (Stage 2) — the room backend relays each player's integer
  // `ticks` (their cumulative keystroke count); we never send sand state
  // (CLAUDE.md §4). Your own sand is driven locally with zero latency; everyone
  // else's pour rate comes from the broadcast — we watch each remote's ticks
  // DELTA and enqueue that many grains at their spout. Protocol: Doc/backend.md.
  // ---------------------------------------------------------------------------
  const CODE_ALPHABET = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; // dropped I L O 0 1
  function makeRoomCode() {
    let s = "";
    for (let i = 0; i < 4; i++) s += CODE_ALPHABET[(Math.random() * CODE_ALPHABET.length) | 0];
    return s;
  }
  function normRoom(s) {
    return String(s || "").trim().toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 12);
  }

  // Source of truth = localStorage so the room survives restarts and works in
  // the fixed-URL shell; a ?room= link still wins on first load (share links).
  let roomId = normRoom(params.get("room")) ||
               normRoom(localStorage.getItem("titb.room")) ||
               makeRoomCode();
  localStorage.setItem("titb.room", roomId);

  // Bring our own connection id (?_pk): we recognise and skip our own grains in
  // the broadcast without any server-side help.
  const myId = (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : (Date.now().toString(36) + Math.random().toString(36).slice(2));
  let playerName = localStorage.getItem("titb.name") || ("玩家-" + myId.slice(0, 4));

  // Backend host: local wrangler dev (127.0.0.1:8787) when running from
  // file:// / localhost; otherwise the Cloudflare Workers subdomain (set after
  // `wrangler deploy` of the renamed worker). ?host= / localStorage override.
  const PROD_HOST = "project-bar.rectrepair.workers.dev";
  const isDev = location.protocol === "file:" ||
                location.hostname === "localhost" ||
                location.hostname === "127.0.0.1";
  const PARTY_HOST = params.get("host") ||
                     localStorage.getItem("titb.partyhost") ||
                     (isDev ? "127.0.0.1:8787" : PROD_HOST);
  const wsProto = /^(localhost|127\.0\.0\.1)/.test(PARTY_HOST) ? "ws" : "wss";

  // slot bookkeeping: you = slot 1; remotes take 2..4, recycling once full.
  const SPOUT_X = { 1: 45, 2: 22, 3: 62, 4: 78 };
  const remoteUsers = Object.create(null); // connId -> user object (also in `users`)
  const usedSlots = new Set([1]);
  function takeSlot() {
    for (let s = 2; s <= 4; s++) if (!usedSlots.has(s)) { usedSlots.add(s); return s; }
    return 2 + (Object.keys(remoteUsers).length % 3); // recycle 2..4 beyond four
  }
  function removeRemote(id) {
    const u = remoteUsers[id];
    if (!u) return;
    const ix = users.indexOf(u); if (ix > 0) users.splice(ix, 1);
    if (u.rowEl) u.rowEl.remove();
    delete remoteUsers[id];
    if (u.slot >= 2 && u.slot <= 4) {
      let stillUsed = false;
      for (const k in remoteUsers) if (remoteUsers[k].slot === u.slot) stillUsed = true;
      if (!stillUsed) usedSlots.delete(u.slot);
    }
  }
  function clearRemotes() { for (const id in remoteUsers) removeRemote(id); }

  function applyState(players) {
    const seen = Object.create(null);
    for (const id in players) {
      if (id === myId) continue; // our own pour is local
      seen[id] = true;
      const p = players[id] || {};
      const t = Number(p.ticks) || 0;
      let u = remoteUsers[id];
      if (!u) {
        const slot = takeSlot();
        u = { id: id, name: p.name || "玩家", you: false, slot: slot,
              x: SPOUT_X[slot] || 45, css: USER_COLORS[slot - 1].css,
              count: t, queue: 0, lastTicks: t }; // baseline: don't dump backlog
        remoteUsers[id] = u;
        users.push(u);
      }
      if (p.name) u.name = p.name;
      const delta = t - u.lastTicks;
      if (delta > 0) { u.queue = Math.min(u.queue + delta, 400); u.lastTicks = t; }
      u.count = t;
    }
    for (const id in remoteUsers) if (!seen[id]) removeRemote(id);
  }

  let ws = null;
  let reconnectTimer = null;
  function setLive(ok) { if (liveDot) liveDot.classList.toggle("off", !ok); } // room-server connection status
  function sendJoin() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "join", name: playerName }));
      pendingTicks = you.count; // sync our current count on entry
    }
  }
  function onWsMessage(e) {
    let data; try { data = JSON.parse(e.data); } catch (_) { return; }
    if (data && data.type === "state") applyState(data.players || {});
  }
  function scheduleReconnect() {
    ws = null;
    setLive(false);
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(function () { reconnectTimer = null; connect(); }, 2000);
  }
  function connect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    let socket;
    try {
      socket = new WebSocket(
        wsProto + "://" + PARTY_HOST + "/parties/main/" +
        encodeURIComponent(roomId) + "?_pk=" + encodeURIComponent(myId)
      );
    } catch (_) { return; } // bad host: stay single-player
    ws = socket;
    socket.onopen = function () { sendJoin(); setLive(true); };
    socket.onmessage = onWsMessage;
    socket.onclose = scheduleReconnect; // auto-reconnect (incl. dev restarts)
    socket.onerror = function () {};     // error is followed by close → reconnect
  }
  function reconnect() {
    if (ws) { ws.onclose = null; try { ws.close(); } catch (_) {} ws = null; }
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    connect();
  }

  // report our cumulative ticks (= keystroke count) on a 10fps throttle
  setInterval(function () {
    if (pendingTicks !== null && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "progress", ticks: pendingTicks }));
      pendingTicks = null;
    }
  }, 100);

  // --- room controls (menu) ---
  function updateRoomLabel() { if (roomCodeEl) roomCodeEl.textContent = roomId; }
  function switchRoom(code) {
    const r = normRoom(code);
    if (!r || r === roomId) return;
    roomId = r;
    localStorage.setItem("titb.room", roomId);
    clearRemotes(); usedSlots.clear(); usedSlots.add(1);
    updateRoomLabel();
    reconnect();
  }
  function newRoom() { let c; do { c = makeRoomCode(); } while (c === roomId); switchRoom(c); }
  function shareLink() {
    const u = new URL(location.href);
    u.searchParams.set("room", roomId);
    return u.toString(); // keeps a #overlay hash for the shell
  }
  function copyText(t) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).catch(function () { fallbackCopy(t); });
    } else fallbackCopy(t);
  }
  function fallbackCopy(t) {
    const ta = document.createElement("textarea");
    ta.value = t; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand("copy"); } catch (_) {}
    ta.remove();
  }

  let editMode = "room"; // 'room' | 'name'
  function openEdit(mode) {
    editMode = mode;
    editRow.hidden = false;
    if (mode === "name") { editInput.value = playerName; editInput.placeholder = "你的昵称…"; editInput.maxLength = 16; }
    else { editInput.value = roomId; editInput.placeholder = "输入房间号加入…"; editInput.maxLength = 12; }
    editInput.focus(); editInput.select();
  }
  function saveEdit() {
    const v = editInput.value.trim();
    if (editMode === "name") {
      if (v) { playerName = v; localStorage.setItem("titb.name", playerName); reconnect(); }
    } else {
      switchRoom(v);
    }
    editRow.hidden = true;
  }
  newRoomBtn.addEventListener("click", function () { newRoom(); });
  joinRoomBtn.addEventListener("click", function () { openEdit("room"); });
  nameBtn.addEventListener("click", function () { openEdit("name"); });
  copyLinkBtn.addEventListener("click", function () {
    copyText(shareLink());
    const old = copyLinkBtn.textContent;
    copyLinkBtn.textContent = "✓ copied";
    setTimeout(function () { copyLinkBtn.textContent = old; }, 1200);
  });
  editSave.addEventListener("click", saveEdit);
  editInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") saveEdit();
    else if (e.key === "Escape") editRow.hidden = true;
  });

  // ---------------------------------------------------------------------------
  // Demo seed (only with ?demo): pre-fill the floor + spin up teammate sims.
  // ---------------------------------------------------------------------------
  function seed() {
    const weighted = [2, 2, 2, 2, 3, 3, 3, 4, 4];
    const tally = [0, 0, 0, 0, 0];
    for (let y = activeH - 26; y < activeH; y++) {
      for (let x = 0; x < W; x++) {
        if (Math.random() < 0.93) { const c = weighted[(Math.random() * weighted.length) | 0]; grid[y * W + x] = c; tally[c]++; }
      }
    }
    if (users[1]) users[1].count = Math.round(tally[2] / 2);
    if (users[2]) users[2].count = Math.round(tally[3] / 2);
    if (users[3]) users[3].count = Math.round(tally[4] / 2);
  }

  // --- init ---
  buildPalette();
  buildArtifacts();
  if (demoMode) {
    users.push({ id: "mina", name: "Mina", you: false, slot: 2, x: 22, count: 0, queue: 0, css: USER_COLORS[1].css, active: 0.8,  burst: 1 });
    users.push({ id: "theo", name: "Theo", you: false, slot: 3, x: 62, count: 0, queue: 0, css: USER_COLORS[2].css, active: 0.5,  burst: 1 });
    users.push({ id: "ren",  name: "Ren",  you: false, slot: 4, x: 78, count: 0, queue: 0, css: USER_COLORS[3].css, active: 0.28, burst: 1 });
    seed();
  }
  updateRoomLabel();
  updateChrome();
  requestAnimationFrame(tick);
  connect();
})();
</script>
</body>
</html>
