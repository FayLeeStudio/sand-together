<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sand Together</title>

<!-- Overlay mode: when the Tauri shell loads this page the URL carries #overlay.
     The whole thing then floats on the desktop like a Bongo-Cat sticker — the
     workbench backdrop goes transparent and only the (semi-transparent) bottle
     and its little control bar paint. In a plain browser (no #overlay) we keep a
     warm backdrop so the floating bottle stays visible for dev. -->
<script>
  // #menu  → the standalone, frameless popover window that shows ONLY the menu
  //          (opened beside the bottle by the shell; never covers/clips it).
  // #overlay → the bottle sticker itself (transparent, floats on the desktop).
  if (location.hash.indexOf("menu") !== -1) {
    document.documentElement.classList.add("menumode");
  } else if (location.hash.indexOf("overlay") !== -1) {
    document.documentElement.classList.add("overlay");
  }
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

<style>
  /* ----------------------------------------------------------------
     Sand Together — a desktop-pet overlay. Keystrokes fall as coloured
     pixel sand into a semi-transparent bottle floating on the desktop; sand
     piles up, freezes into 16px history bands, and can be dug back up.
     Pure HTML/CSS/vanilla JS — no framework, no build step (CLAUDE.md §5).

     Form factor: the bottle is the body (drag it to dig); a thin bar below
     carries your keystroke count + a ≡ menu (drag the bar to move the window).
  ---------------------------------------------------------------- */

  :root {
    /* identity colours (sand + ranking) */
    --color-user-you: #e0a24e;
    --color-user-1:   #46b6a6;
    --color-user-2:   #9c82dd;
    --color-user-3:   #de6e92;
    --color-accent:   #e0a24e;

    /* floating chrome (bar + menu) — dark translucent so it stays legible on
       any wallpaper, matching the frosted bottle */
    --chrome-bg:      rgba(22,22,25,.78);
    --chrome-border:  rgba(255,255,255,.10);
    --chrome-text:    #e8e6df;
    --chrome-weak:    #a09e94;
    --chrome-divider: rgba(255,255,255,.08);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: #e7e5df;            /* browser-only backdrop */
    color: var(--chrome-text);
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }

  /* Overlay mode (Tauri shell): desktop shows through; only bottle + bar paint. */
  html.overlay, html.overlay body {
    background: transparent !important;
    overflow: hidden;
  }

  .workbench {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    user-select: none;
    -webkit-user-select: none;
  }
  /* In the App (overlay) right-anchor the pet, so when the menu opens we can grow the
     window to the LEFT into that space; in a plain browser keep it centred for dev. */
  html.overlay .workbench { justify-content: flex-end; }

  .pet { position: relative; display: flex; flex-direction: column; gap: 8px; }

  /* ---- the bottle ----------------------------------------------------- */
  .bottle-wrap { position: relative; width: 160px; height: 500px; }

  canvas#bottle {
    display: block;
    width: 160px; height: 500px;
    background: transparent;                 /* the tint is painted inside the canvas */
    border: none;                            /* flat & pure-transparent (Beeper-style): no */
    image-rendering: pixelated;              /* frame, no drop-shadow, no frost — only sand */
    cursor: grab;
    touch-action: none;
  }
  canvas#bottle.grabbing { cursor: grabbing; }

  .scrollbar {
    display: none;                /* hidden per design — drag the bottle to scroll */
    position: absolute;
    top: 8px; right: 8px; bottom: 8px;
    width: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,.06);
  }
  .thumb {
    position: absolute;
    left: 0; width: 100%;
    top: 0; height: 30%;
    border-radius: 2px;
    background: rgba(255,255,255,.28);
  }

  /* Navigation bars: thin pills pinned to the top (back to surface) and bottom
     (dig down into history) edges of the bottle. They fade in when you hover the
     bottle, and each only exists when that direction is actually reachable. */
  .nav-btn {
    position: absolute;
    left: 14px; right: 14px;
    height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit; font-size: 11px; letter-spacing: .12em;
    color: #161619;
    background: #fff;
    border: none; border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.35);
    opacity: 0; transition: opacity .14s;
    pointer-events: none;            /* invisible + inert until the bottle is hovered */
  }
  .bottle-wrap:hover .nav-btn { opacity: .92; pointer-events: auto; }
  .nav-btn:hover { opacity: 1; }
  .nav-btn[hidden] { display: none; }
  .nav-top { top: 8px; }
  .nav-bot { bottom: 8px; }

  /* ---- top bar (drag handle: moves the window) ----------------------- */
  .bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 8px 7px 12px;
    background: var(--chrome-bg);
    border: 1px solid var(--chrome-border);
    border-radius: 8px;
    cursor: grab;
  }
  .bar:active { cursor: grabbing; }
  .bar-stats { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--color-user-1);
    flex: none;
    animation: blink 2.4s infinite;
  }
  /* not connected to a room server: grey + no blink (honest status indicator) */
  .live-dot.off { background: #6b6b6b; animation: none; }
  .bar-metric { display: flex; flex-direction: column; line-height: 1.1; }
  #barCount { font-weight: 700; color: var(--chrome-text); }
  .bar-unit {
    font-size: 8.5px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--chrome-weak);
  }
  .menu-btn {
    flex: none;
    font-family: inherit;
    font-size: 15px; line-height: 1;
    color: var(--chrome-text);
    background: rgba(255,255,255,.06);
    border: 1px solid var(--chrome-border);
    border-radius: 6px;
    width: 30px; height: 26px;
    padding: 0;
    cursor: pointer;
  }
  .menu-btn:hover { background: rgba(255,255,255,.12); }

  /* ---- menu (drops down from the top bar) ---------------------------- */
  .menu {
    position: absolute;
    right: 0; top: 46px;
    width: 230px;
    background: var(--chrome-bg);
    border: 1px solid var(--chrome-border);
    border-radius: 8px;
    padding: 12px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 5;
  }
  .menu[hidden] { display: none; }

  .menu-label {
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--chrome-weak);
  }
  .ranking { display: flex; flex-direction: column; gap: 10px; }
  .rank-row { display: flex; flex-direction: column; gap: 5px; }
  .rank-head { display: flex; align-items: center; gap: 8px; }
  .rank-swatch { width: 9px; height: 9px; border-radius: 2px; flex: none; }
  .rank-name { font-size: 12px; color: var(--chrome-text); flex: 1; }
  .rank-role {
    font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--chrome-weak);
  }
  .rank-count { font-size: 11.5px; font-weight: 700; color: var(--chrome-text); min-width: 42px; text-align: right; }
  .rank-bar { height: 4px; border-radius: 3px; background: rgba(255,255,255,.10); overflow: hidden; }
  .rank-bar > i { display: block; height: 100%; width: 0%; border-radius: 3px; transition: width .3s ease; }

  .menu-buried { font-size: 10.5px; color: var(--chrome-weak); display: flex; align-items: center; gap: 7px; }
  .buried-dot { width: 6px; height: 6px; border-radius: 1px; background: var(--chrome-weak); flex: none; }

  .menu-sep { height: 1px; background: var(--chrome-divider); }

  .menu-item {
    font-family: inherit;
    font-size: 11px; letter-spacing: .04em;
    text-align: left;
    color: var(--chrome-text);
    background: transparent;
    border: none;
    border-radius: 5px;
    padding: 8px 9px;
    cursor: pointer;
  }
  .menu-item:hover { background: rgba(255,255,255,.08); }
  .menu-item.danger { color: var(--color-user-3); }
  .menu-room { color: var(--color-accent); font-weight: 700; letter-spacing: .08em; }
  .menu-edit { display: flex; gap: 6px; padding: 2px 0; }
  .menu-edit[hidden] { display: none; }
  .menu-edit input {
    flex: 1; min-width: 0;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--chrome-border);
    border-radius: 5px;
    color: var(--chrome-text);
    font-family: inherit; font-size: 12px;
    padding: 6px 8px;
  }
  .menu-edit input:focus { outline: none; border-color: var(--color-accent); }
  .menu-edit button {
    flex: none;
    font-family: inherit; font-size: 11px;
    color: #161619; background: var(--color-accent);
    border: none; border-radius: 5px;
    padding: 0 12px; cursor: pointer;
  }

  /* ---- debug section (only shown when the App runs with ?debug=1) ----- */
  .menu-debug[hidden] { display: none; }
  .menu-debug { display: flex; flex-direction: column; gap: 2px; }
  .menu-brush { display: flex; align-items: center; gap: 4px; padding: 2px 0 4px; }
  .menu-brush-tag { font-size: 10.5px; color: var(--chrome-weak); margin-right: 2px; }
  .menu-brush button {
    flex: none; width: 22px; height: 22px;
    font-family: inherit; font-size: 11px;
    color: var(--color-accent); background: rgba(255,255,255,.06);
    border: 1px solid rgba(127,255,212,.45); border-radius: 5px; cursor: pointer;
  }
  .menu-brush button.on { color: #0a0a0a; background: var(--color-accent); }
  .menu-item.on { color: #0a0a0a; background: var(--color-accent); }
  /* debug header (label + Switch) and the collapsible body it toggles */
  .menu-debug-head { display: flex; align-items: center; justify-content: space-between; }
  .menu-debug-body { display: flex; flex-direction: column; gap: 2px; margin-top: 4px; }
  .menu-debug-body[hidden] { display: none; }
  .switch {
    flex: none; width: 32px; height: 18px; padding: 0;
    border: none; border-radius: 9px; cursor: pointer; position: relative;
    background: rgba(255,255,255,.18); transition: background .15s ease;
  }
  .switch[aria-checked="true"] { background: var(--color-accent); }
  .switch > i {
    position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #fff; transition: left .15s ease;
  }
  .switch[aria-checked="true"] > i { left: 16px; }
  /* perf readout — moved off the canvas into here so it never covers the buttons */
  .menu-perf {
    margin: 4px 0 0; padding: 5px 6px;
    font: 10px/1.45 'JetBrains Mono', monospace;
    color: var(--color-accent); background: rgba(0,0,0,.35);
    border-radius: 5px; white-space: pre-wrap;
  }

  /* ---- standalone menu popover window (#menu) ------------------------ */
  /* This page is loaded a SECOND time in its own frameless, transparent Tauri
     window; there it shows only the menu, filling the window as a floating panel. */
  html.menumode, html.menumode body { background: transparent !important; overflow: hidden; }
  html.menumode .workbench { padding: 0; min-height: 0; display: block; }
  html.menumode .pet { display: block; }
  html.menumode .bar, html.menumode .bottle-wrap { display: none; }
  html.menumode .menu {
    position: static; right: auto; top: auto;
    width: 100%; min-height: 0;            /* height follows content; JS fits the window to it */
    border: none; border-radius: 10px;
  }
  html.menumode .menu[hidden] { display: flex; }   /* this window IS the menu — always shown */

  @keyframes blink { 0%,55% { opacity: 1; } 56%,100% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    .live-dot { animation: none !important; }
    .rank-bar > i { transition: none !important; }
  }
</style>
</head>
<body>

  <div class="workbench" id="workbench">
    <div class="pet" id="pet">

      <!-- BAR · stats + menu, on top (drag to move the window) -------- -->
      <div class="bar" id="bar">
        <div class="bar-stats">
          <span class="live-dot off" id="liveDot"></span>
          <span class="bar-metric">
            <span id="barCount">0</span>
            <span class="bar-unit">keystrokes</span>
          </span>
        </div>
        <button class="menu-btn" id="menuBtn" data-no-drag aria-haspopup="true" aria-label="菜单">≡</button>
      </div>

      <!-- MENU (hidden until ≡) -------------------------------------- -->
      <div class="menu" id="menu" data-no-drag hidden>
        <div class="menu-label">who's pouring</div>
        <div class="ranking" id="ranking"></div>
        <div class="menu-buried"><span class="buried-dot"></span><span id="buriedText">0</span>&nbsp;grains recorded below</div>

        <div class="menu-sep"></div>
        <div class="menu-label">room <span class="menu-room">#<span id="roomCode">----</span></span></div>
        <button class="menu-item" id="newRoomBtn">new room</button>
        <button class="menu-item" id="joinRoomBtn">join room…</button>
        <button class="menu-item" id="copyLinkBtn">copy invite link</button>
        <button class="menu-item" id="nameBtn">nickname…</button>
        <div class="menu-edit" id="editRow" hidden>
          <input id="editInput" type="text" autocomplete="off" spellcheck="false">
          <button id="editSave">ok</button>
        </div>

        <div class="menu-sep"></div>
        <button class="menu-item danger" id="exitBtn">exit</button>

        <div class="menu-sep" id="debugSep" hidden></div>
        <div class="menu-debug" id="debugRow" hidden>
          <div class="menu-debug-head">
            <span class="menu-label">debug</span>
            <button class="switch" id="debugSwitch" role="switch" aria-checked="false" aria-label="debug panel"><i></i></button>
          </div>
          <div class="menu-debug-body" id="debugBody" hidden>
            <div class="menu-brush" id="brushRow"><span class="menu-brush-tag">spout</span></div>
            <button class="menu-item" id="pourBtn">💧 pour continuously</button>
            <button class="menu-item" id="floodBtn">⏬ flood-fill (archive test)</button>
            <button class="menu-item" id="resetBtn">empty the bottle</button>
            <pre class="menu-perf" id="perfBox">—</pre>
          </div>
        </div>
      </div>

      <!-- BODY · the bottle (drag to dig) ----------------------------- -->
      <div class="bottle-wrap">
        <canvas id="bottle" width="160" height="500" data-no-drag aria-label="瓶子"></canvas>
        <div class="scrollbar"><div class="thumb" id="thumb"></div></div>
        <button class="nav-btn nav-top" id="surfaceBtn" data-no-drag hidden title="回到地表">↑ 回到地表</button>
        <button class="nav-btn nav-bot" id="peekBtn" data-no-drag hidden title="查看历史">↓ 查看历史</button>
      </div>

    </div>
  </div>

<script>
(function () {
  "use strict";
  // Server-authoritative client (Stage 1). The falling-sand PHYSICS runs on the
  // server now (CLAUDE.md, 2026-06-21): we only send our input (cumulative
  // keystroke count) and RENDER the authoritative grid the server broadcasts.
  // Everyone in a room therefore sees the exact same canvas. No local physics.

  const $ = function (id) { return document.getElementById(id); };

  // --- DOM handles ---
  const workbench  = $("workbench");
  const bar        = $("bar");
  const canvas     = $("bottle");
  const thumbEl    = $("thumb");
  const surfaceBtn = $("surfaceBtn");
  const peekBtn    = $("peekBtn");
  const menuBtn    = $("menuBtn");
  const menu       = $("menu");
  const resetBtn   = $("resetBtn");
  const exitBtn    = $("exitBtn");
  const rankingEl  = $("ranking");
  const barCount   = $("barCount");
  const liveDot    = $("liveDot");
  const buriedText = $("buriedText");
  const roomCodeEl = $("roomCode");
  const newRoomBtn = $("newRoomBtn");
  const joinRoomBtn= $("joinRoomBtn");
  const copyLinkBtn= $("copyLinkBtn");
  const nameBtn    = $("nameBtn");
  const editRow    = $("editRow");
  const editInput  = $("editInput");
  const editSave   = $("editSave");
  const debugSep   = $("debugSep");
  const debugRow   = $("debugRow");
  const debugSwitch= $("debugSwitch");
  const debugBody  = $("debugBody");
  const brushRow   = $("brushRow");
  const pourBtn    = $("pourBtn");
  const floodBtn   = $("floodBtn");
  const perfBox    = $("perfBox");

  // Tauri APIs exist only inside the shell. The shell feeds a global input COUNT
  // via the 'keycount' event (counting happens only in Rust — CLAUDE.md §3); the
  // webview never reads global input itself, and never decides grain placement.
  const TW        = window.__TAURI__ && window.__TAURI__.window;
  const TE        = window.__TAURI__ && window.__TAURI__.event;
  // LogicalSize lives in the dpi module in Tauri v2 (NOT window) — needed to fit the
  // menu popover to its content height. Tolerate either namespace just in case.
  const TLogicalSize = window.__TAURI__ && (
    (window.__TAURI__.dpi && window.__TAURI__.dpi.LogicalSize) ||
    (window.__TAURI__.window && window.__TAURI__.window.LogicalSize)
  );
  const appWindow = TW ? TW.getCurrentWindow() : null;
  const params    = new URLSearchParams(location.search);

  // Opt-in perf HUD (?perf=1 or #perf): measures where the "卡" actually is —
  // render cost (draw ms/frame), real frame rate, per-message parse+apply ms,
  // patch size/cells, and round-trip latency (app-level ping/pong). Zero cost when
  // off — every hot-path counter is guarded by PERF. Purely diagnostic.
  // ?debug=1 turns on testing aids (flood button below) AND the perf HUD; ?perf=1 is the HUD alone.
  const DEBUG = params.has("debug") || /(^|[#&])debug/.test(location.hash);
  const PERF = DEBUG || params.has("perf") || /(^|[#&])perf/.test(location.hash);
  // Live debug-fill state owned by the App window; mirrored to the menu popover
  // (menu:state) so its toggles read right, and applied to the WS as flood/pour/spout.
  const dbg = { flood: false, pour: false, spout: 1 };
  const perf = PERF ? { frames: 0, patches: 0, bytes: 0, cells: 0, peakCells: 0, parseMs: 0, drawMs: 0, rtt: 0, t0: 0 } : null;
  let perfLine = "";

  // Objective identity palette: grid cells hold a slot 1..4 (0 = empty). Colour
  // is assigned by the server and identical on every client. "Which one is me" is
  // shown by a label, not by colour.
  const USER_COLORS = [
    { css: "#e0a24e", rgb: [224, 162, 78]  }, // slot 1 — amber
    { css: "#46b6a6", rgb: [70, 182, 166]  }, // slot 2 — teal
    { css: "#9c82dd", rgb: [156, 130, 221] }, // slot 3 — violet
    { css: "#de6e92", rgb: [222, 110, 146] }, // slot 4 — rose
  ];
  const COLOR_NAMES = ["amber", "teal", "violet", "rose"];
  function colorToSlot(c) { const i = COLOR_NAMES.indexOf(c); return i >= 0 ? i + 1 : 1; }

  // ---------------------------------------------------------------------------
  // Menu popover window (#menu) — a separate, frameless Tauri window showing ONLY
  // the menu, so it never covers (or is clipped by) the tiny bottle window. It holds
  // NO game state: the main overlay window pushes the roster here via a 'menu:state'
  // event, and we send user actions back via 'menu:cmd' (+ 'app:exit' to quit). The
  // server-authoritative model is intact — this window only renders what it's handed.
  // ---------------------------------------------------------------------------
  if (document.documentElement.classList.contains("menumode")) { runMenuWindow(); return; }
  function runMenuWindow() {
    menu.hidden = false;                         // this whole window IS the menu
    const selfWin = (TW && TW.getCurrentWindow) ? TW.getCurrentWindow() : null;
    function selfHide() { try { if (selfWin && selfWin.hide) selfWin.hide(); } catch (_) {} }
    function emitCmd(p) { if (TE && TE.emit) TE.emit("menu:cmd", p); }
    // Fit the popover window to its content height, so exit is never clipped and the
    // window shrinks back when the debug panel is collapsed. Width stays as configured.
    const MENU_W = 260;                          // matches tauri.conf "menu" window width
    let lastFitH = 0;
    function fitHeight() {
      if (!selfWin || !TLogicalSize || !selfWin.setSize) return;
      requestAnimationFrame(function () {
        const h = Math.ceil(menu.getBoundingClientRect().height);
        if (h && h !== lastFitH) { lastFitH = h; try { Promise.resolve(selfWin.setSize(new TLogicalSize(MENU_W, h))).catch(function () {}); } catch (_) {} }
      });
    }
    function copyToClipboard(t) {
      if (!t) return;                            // we have the button's user-activation here,
      function fallback() {                      // so clipboard writes are reliable (unlike the
        const ta = document.createElement("textarea"); ta.value = t;  // unfocused main window).
        ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand("copy"); } catch (_) {}
        ta.remove();
      }
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).catch(fallback);
      else fallback();
    }

    let last = {};
    function render(s) {
      last = s || {};
      buriedText.textContent = (s.buried || 0).toLocaleString();
      roomCodeEl.textContent = s.room || "----";
      const list = s.players || [];
      let max = 1; for (const p of list) if (p.count > max) max = p.count;
      rankingEl.textContent = "";
      for (const p of list) {
        const row = document.createElement("div"); row.className = "rank-row";
        const head = document.createElement("div"); head.className = "rank-head";
        const sw = document.createElement("span"); sw.className = "rank-swatch"; sw.style.background = p.css;
        const nm = document.createElement("span"); nm.className = "rank-name"; nm.textContent = p.name;
        const role = document.createElement("span"); role.className = "rank-role"; role.textContent = p.you ? "you" : "teammate";
        const cnt = document.createElement("span"); cnt.className = "rank-count"; cnt.textContent = (p.count || 0).toLocaleString();
        head.appendChild(sw); head.appendChild(nm); head.appendChild(role); head.appendChild(cnt);
        const barEl = document.createElement("div"); barEl.className = "rank-bar";
        const fill = document.createElement("i"); fill.style.background = p.css;
        fill.style.width = Math.max(3, Math.round((p.count / max) * 100)) + "%";
        barEl.appendChild(fill);
        row.appendChild(head); row.appendChild(barEl);
        rankingEl.appendChild(row);
      }
      // debug section: only the App (?debug=1) pushes s.debug; mirror the live
      // flood/pour/spout state + perf readout so they read right even after a reopen.
      const on = !!s.debug;
      debugSep.hidden = !on; debugRow.hidden = !on;
      if (on) {
        const d = s.dbg || {};
        pourBtn.classList.toggle("on", !!d.pour);
        floodBtn.classList.toggle("on", !!d.flood);
        const sz = d.spout || 1;
        for (const b of brushRow.querySelectorAll("button")) b.classList.toggle("on", +b.dataset.size === sz);
        perfBox.textContent = s.perf || "—";
      }
      fitHeight();                                 // window follows content (ranking + debug panel)
    }

    if (TE && TE.listen) TE.listen("menu:state", function (e) { try { render(e.payload || {}); } catch (_) {} });
    if (TE && TE.emit) TE.emit("menu:request");    // pull the current roster on open

    let editMode = "room";
    function openEdit(mode) {
      editMode = mode; editRow.hidden = false;
      if (mode === "name") { editInput.placeholder = "你的昵称…"; editInput.maxLength = 16; }
      else { editInput.placeholder = "输入房间号加入…"; editInput.maxLength = 12; }
      editInput.value = ""; editInput.focus();
    }
    function saveEdit() {
      const v = editInput.value.trim(); editRow.hidden = true;
      if (editMode === "name") { if (v) { emitCmd({ action: "setName", name: v }); selfHide(); } }
      else { if (v) { emitCmd({ action: "join", room: v }); selfHide(); } }
    }

    newRoomBtn.addEventListener("click", function () { emitCmd({ action: "newRoom" }); selfHide(); });
    joinRoomBtn.addEventListener("click", function () { openEdit("room"); });
    nameBtn.addEventListener("click", function () { openEdit("name"); });
    copyLinkBtn.addEventListener("click", function () {
      copyToClipboard(last.link);                // link is built by the main window (state)
      const old = copyLinkBtn.textContent; copyLinkBtn.textContent = "✓ copied";
      setTimeout(function () { copyLinkBtn.textContent = old; }, 1200);
    });
    editSave.addEventListener("click", saveEdit);
    editInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") saveEdit();
      else if (e.key === "Escape") editRow.hidden = true;
    });
    resetBtn.addEventListener("click", function () { emitCmd({ action: "reset" }); selfHide(); });
    exitBtn.addEventListener("click", function () { if (TE && TE.emit) TE.emit("app:exit"); });

    // debug panel Switch: collapsed by default (keeps the menu short); tap to reveal
    // the fill tools + perf readout, tap again to hide. The window refits each time.
    debugSwitch.addEventListener("click", function () {
      const open = debugSwitch.getAttribute("aria-checked") !== "true";
      debugSwitch.setAttribute("aria-checked", open ? "true" : "false");
      debugBody.hidden = !open;
      fitHeight();
    });

    // debug controls — emit intents; the App owns the WS and forwards them + reflects
    // the resulting state back via menu:state (so we don't track truth here).
    for (let n = 1; n <= 5; n++) {
      const b = document.createElement("button");
      b.textContent = String(n); b.title = "brush " + n + "×" + n; b.dataset.size = n;
      b.addEventListener("click", function () { emitCmd({ action: "spout", size: n }); });
      brushRow.appendChild(b);
    }
    pourBtn.addEventListener("click", function () { emitCmd({ action: "pour", on: !pourBtn.classList.contains("on") }); });
    floodBtn.addEventListener("click", function () { emitCmd({ action: "flood", on: !floodBtn.classList.contains("on") }); });
  }

  // --- render constants (MUST match the server's sim: W/H/colours/spout) ---
  const W = 80, H = 300;     // authoritative grid size (server owns it; H raised 200→300 for a taller bottle)
  const S = 2;               // px per cell — SQUARE pixels. 80*2=160px wide; with viewRows below the bottle is 500px tall
  const viewRows = 250;      // visible rows (250 * S = 500px); must stay < H so the camera has room to scroll
  const SRC_R = 5;           // bulb radius in grid rows (scales with S → a smaller, still-round ball at S=2)
  // --- spout / camera placement (tune these two to taste) ---
  // SPAWN_GAP: how far the spout floats ABOVE the settled surface (matches the server's
  // spawn altitude, so the bulb sits where sand actually emerges). Small = spout hugs the
  // sand, no big empty gap. CAMERA_ANCHOR: where the settled surface sits down the view
  // (0.30 → surface ~30% down, so sand fills the lower ~70% and the spout rides near the
  // top, close to the bar). Lower CAMERA_ANCHOR pushes the surface + spout higher.
  // Two knobs for the look:
  //   CAMERA_ANCHOR = where the settled SURFACE sits down the view. 0.382 → sand fills
  //                   the lower ~0.618 (golden ratio). Bigger = less sand.
  //   SPAWN_GAP     = how far the SPOUT floats above the surface (also the server's spawn
  //                   altitude — keep both in sync). Spout's screen position works out to
  //                   CAMERA_ANCHOR*viewRows − SPAWN_GAP ≈ 8% down (hugs the top bar).
  const SPAWN_GAP = 75;      // source rides this far above the surface (matches server)
  const CAMERA_ANCHOR = 0.382; // pin the settled surface ~0.382 down → sand fills lower ~0.618
  const SPOUT_X = { 1: 30, 2: 50, 3: 10, 4: 70 }; // evenly spaced across W=80, centre-out (must match server)

  // --- authoritative grid (mirror of the server's), updated by snapshot/patch ---
  const grid = new Uint8Array(W * H);
  // Stage 3 archive. The server moves the active grid's bottom rows VERBATIM into
  // `bands` (lossless — the exact pixels). Each band lives BELOW the active grid at its
  // TRUE height (`rows` world rows) and renders identically to live sand, so scrolling
  // down shows the complete, faithful history as one continuous tower.
  // bands[]: index 0 = oldest/deepest, last = newest (sits just under the grid).
  let bands = [];                      // [{ rows, n, cells:Uint8Array(rows*W) }]
  // archiveSeg maps world rows → band: contiguous [top, top+rows) segments, ordered
  // top→down (seg 0 = newest, just under the grid). Rebuilt only when bands change
  // (rare), so the per-frame render stays a windowed O(viewRows) walk — that windowing
  // IS the cache that keeps dragging through a long history smooth.
  let archiveSeg = [];                 // [{ top, rows, bi }]
  let archiveRows = 0;                 // Σ band.rows = true archive height in world rows
  function worldH() { return H + archiveRows; }
  function rebuildArchive() {
    archiveSeg = []; let top = H;
    for (let i = bands.length - 1; i >= 0; i--) { archiveSeg.push({ top: top, rows: bands[i].rows, bi: i }); top += bands[i].rows; }
    archiveRows = top - H;
  }
  function segFor(wy) { // binary search the segment containing world row wy (wy >= H)
    let lo = 0, hi = archiveSeg.length - 1;
    while (lo < hi) { const mid = (lo + hi) >> 1, s = archiveSeg[mid]; if (s.top + s.rows <= wy) lo = mid + 1; else hi = mid; }
    return archiveSeg[lo];
  }
  let cameraY = H - viewRows; // world row at the top of the viewport (float)
  let follow = true;
  let camTarget = null;       // when not following + not dragging, ease toward this (peek button)
  let drag = null;
  let frame = 0;

  // BAYER4 — ordered-dither matrix, still used by the source bulb (drawSource) below.
  const BAYER4 = [0, 8, 2, 10, 12, 4, 14, 6, 3, 11, 1, 9, 15, 7, 13, 5];

  function packRGB(r, g, b) { return ((255 << 24) | (b << 16) | (g << 8) | r) >>> 0; }

  // Per-grain colour jitter (the Sandboxels "grainy sand" look). Each grid cell renders
  // as a flat 2×2 block; we just nudge its single colour grain-to-grain so a field of one
  // player's sand reads as granular noise instead of a flat slab. The offset is a PURE
  // hash of world position (x, wy) + slot — so it's identical on every client (server-
  // authoritative safe), needs ZERO per-grain state on the wire, and is locked to the
  // sand (scrolls with the tower). Settled sand looks grainy; only the live falling
  // curtain "flows through" the static field, which is fine since sand settles fast.
  // (Replaces the old depth-shade + Bayer dither; same offset on R/G/B = brightness-only
  // jitter, hue stays put.)
  const JITTER = 15;          // ± brightness offset on the 0..255 scale (≈ Sandboxels; tune freely)
  // 32-bit integer hash (murmur3 fmix finalizer). Math.imul keeps every multiply inside
  // 32 bits: a plain `a * b` here overflows 2^53 and silently zeroes the low bits, which
  // collapsed every cell to the same hash → all sand one flat tone. Do NOT swap in `*`.
  function cellJitter(x, y, slot) {
    let n = Math.imul(x, 374761393) ^ Math.imul(y, 668265263) ^ Math.imul(slot, 2246822519);
    n ^= n >>> 16; n = Math.imul(n, 0x85ebca6b);
    n ^= n >>> 13; n = Math.imul(n, 0xc2b2ae35);
    n ^= n >>> 16;
    return ((n >>> 0) % (2 * JITTER + 1)) - JITTER;   // deterministic integer in [-JITTER, +JITTER]
  }

  // offscreen compositing buffer (a touch taller for sub-pixel scroll)
  const view = document.createElement("canvas");
  view.width = W; view.height = viewRows + 2;
  const vctx = view.getContext("2d");
  const vimg = vctx.createImageData(W, viewRows + 2);
  const vbuf = new Uint32Array(vimg.data.buffer);
  let ctx = null;

  // --- players (for ranking + bulbs). `you` flagged; never distinguished by colour ---
  const players = Object.create(null); // id -> { id, name, slot, css, x, count, you, online, rowEl... }
  let myCount = 0;            // our local cumulative keystroke count (drives bar + report)
  let youBaselineSet = false; // first keycount sets a baseline (no jump)
  let pendingTicks = null;    // latest count awaiting report to the server

  // ---------------------------------------------------------------------------
  // Camera helpers — read the surface from the (server-owned) grid.
  // ---------------------------------------------------------------------------
  function maxCameraY() { return Math.max(0, worldH() - viewRows); } // can scroll down into the archive
  // The settled pile top: the first row (scanning top→down) holding enough sand to
  // be a real surface — NOT the handful of grains still streaming down from the
  // spouts. Anchoring on the bare highest-occupied cell made the camera and the
  // spouts jitter every frame as grains fell past; counting a few cells is stable.
  const SURFACE_MIN_CELLS = 6;
  function surface() {
    for (let y = 0; y < H; y++) {
      const b = y * W; let n = 0;
      for (let x = 0; x < W; x++) if (grid[b + x] && ++n >= SURFACE_MIN_CELLS) return y;
    }
    return H;
  }
  // Low-passed surface so the camera + spouts glide instead of stepping row by row.
  let smSurface = H;
  // Keep the pile surface pinned at CAMERA_ANCHOR (0.618) down the view: the upper
  // ~62% is transparent sky holding the fixed spout, the lower ~38% shows the tower
  // top. While the tower is short the target sits below maxCameraY, so the camera
  // just rests at the bottom; once the tower is tall enough to reach the line the
  // camera follows up (cameraY may go negative — that's just more sky above the grid).
  function followTarget() { return Math.min(maxCameraY(), Math.round(smSurface) - Math.round(viewRows * CAMERA_ANCHOR)); }
  function camLo() { return Math.min(followTarget(), maxCameraY()); } // topmost reachable view (anchored surface; may be < 0)

  // ---------------------------------------------------------------------------
  // Render — blit the visible window of the authoritative grid.
  // ---------------------------------------------------------------------------
  function buildView() {
    const start = Math.floor(cameraY), rows = viewRows + 2, wTotal = H + archiveRows;
    vbuf.fill(0);
    let seg = null, segEnd = 0, src = grid, srcBase = 0; // src+base pick the row's pixels (grid or a band)
    for (let sr = 0; sr < rows; sr++) {
      const wy = start + sr;
      if (wy < 0 || wy >= wTotal) continue;
      if (wy < H) { src = grid; srcBase = wy * W; }
      else { // archived band — read its REAL pixels at the band-local row (incremental seg walk)
        if (!seg || wy >= segEnd) { seg = segFor(wy); segEnd = seg.top + seg.rows; src = bands[seg.bi].cells; }
        srcBase = (wy - seg.top) * W;
      }
      // flat colour per grain + per-position jitter — active grid and archive share one
      // noise field keyed on world row wy, so history reads seamlessly and every client
      // paints the identical texture.
      const o = sr * W;
      for (let x = 0; x < W; x++) {
        const c = src[srcBase + x];
        if (!c) continue;
        const base = USER_COLORS[c - 1];
        if (!base) continue;
        const rgb = base.rgb, j = cellJitter(x, wy, c);
        let r = rgb[0] + j, g = rgb[1] + j, b = rgb[2] + j;
        if (r < 0) r = 0; else if (r > 255) r = 255;
        if (g < 0) g = 0; else if (g > 255) g = 255;
        if (b < 0) b = 0; else if (b > 255) b = 255;
        vbuf[o + x] = packRGB(r, g, b);
      }
    }
    vctx.putImageData(vimg, 0, 0);
  }

  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    return "rgba(" + r + "," + g + "," + b + "," + a + ")";
  }
  function shadeCss(hex, f) {
    const r = Math.min(255, Math.round(parseInt(hex.slice(1, 3), 16) * f));
    const g = Math.min(255, Math.round(parseInt(hex.slice(3, 5), 16) * f));
    const b = Math.min(255, Math.round(parseInt(hex.slice(5, 7), 16) * f));
    return "rgb(" + r + "," + g + "," + b + ")";
  }
  // A pixel-art bulb per pourer, drawn at the live source row (matches where the
  // server spawns: just above the surface). Purely decorative.
  function drawSource(u, cy) {
    const cx = u.x * S, R = SRC_R * S, step = S;
    ctx.fillStyle = u.css;
    ctx.font = "7px 'Silkscreen', 'JetBrains Mono', monospace";
    ctx.textAlign = "center";
    ctx.fillText(u.name, cx, cy - R - 7);
    const tones = [shadeCss(u.css, 1.25), u.css];
    const glass = hexToRgba(u.css, 0.07);
    const outline = hexToRgba(u.css, 0.5);
    const rimRel = -R * 0.30, dipd = R * 0.64;
    for (let gy = cy - R - step; gy <= cy + R + step; gy += step) {
      const by = (((gy / step) | 0) & 3) << 2;
      const cyc = gy + step / 2 - cy;
      for (let gx = cx - R - step; gx <= cx + R + step; gx += step) {
        const cxc = gx + step / 2 - cx;
        const dist = Math.sqrt(cxc * cxc + cyc * cyc);
        if (dist <= R) {
          const n = Math.min(1, Math.abs(cxc) / R);
          const surf = rimRel + dipd * (1 - n);
          if (cyc >= surf) {
            const dep = (cyc - surf) / step;
            const sv = dep <= 2 ? 0 : (dep <= 4 ? 0.5 : 1);
            const th = BAYER4[by | (((gx / step) | 0) & 3)] * 0.0625;
            ctx.fillStyle = tones[sv > th ? 1 : 0];
          } else {
            ctx.fillStyle = glass;
          }
          ctx.fillRect(gx, gy, step, step);
        } else if (dist <= R + step * 0.7 && !(cyc > R * 0.5 && Math.abs(cxc) < R * 0.34)) {
          ctx.fillStyle = outline;
          ctx.fillRect(gx, gy, step, step);
        }
      }
    }
  }

  function draw() {
    buildView();
    const frac = cameraY - Math.floor(cameraY);
    ctx.clearRect(0, 0, W * S, viewRows * S);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(view, 0, 0, W, viewRows + 2, 0, -frac * S, W * S, (viewRows + 2) * S);

    // bulbs at the live source row (just above the surface; same rule as server)
    const srcRow = Math.max(0, Math.round(smSurface) - SPAWN_GAP);
    const bulbCy = Math.round((srcRow - cameraY) * S);
    if (bulbCy > -(SRC_R * S + 14) && bulbCy < viewRows * S) {
      for (const id in players) if (players[id].online !== false) drawSource(players[id], bulbCy);
    }

    // scroll thumb (denominator spans the active grid + the archive below)
    const visFrac = Math.min(1, viewRows / worldH());
    const hPct = Math.max(8, visFrac * 100);
    const denom = maxCameraY();
    const pos = denom > 0 ? cameraY / denom : 0;
    thumbEl.style.height = hPct + "%";
    thumbEl.style.top = (pos * (100 - hPct)) + "%";
  }

  // ---------------------------------------------------------------------------
  // Chrome — ranking rows (keyed per player) + bar count + buried count.
  // ---------------------------------------------------------------------------
  function ensureRow(u) {
    if (u.rowEl) return;
    const row = document.createElement("div");
    row.className = "rank-row";
    const head = document.createElement("div"); head.className = "rank-head";
    const sw = document.createElement("span"); sw.className = "rank-swatch"; sw.style.background = u.css;
    const nm = document.createElement("span"); nm.className = "rank-name"; nm.textContent = u.name;
    const role = document.createElement("span"); role.className = "rank-role"; role.textContent = u.you ? "you" : "teammate";
    const cnt = document.createElement("span"); cnt.className = "rank-count"; cnt.textContent = "0";
    head.appendChild(sw); head.appendChild(nm); head.appendChild(role); head.appendChild(cnt);
    const barEl = document.createElement("div"); barEl.className = "rank-bar";
    const fill = document.createElement("i"); fill.style.background = u.css;
    barEl.appendChild(fill);
    row.appendChild(head); row.appendChild(barEl);
    rankingEl.appendChild(row);
    u.rowEl = row; u.countEl = cnt; u.barEl = fill; u.swatchEl = sw; u.nameEl = nm; u.roleEl = role;
  }
  function gridGrains() { let n = 0; for (let i = 0; i < grid.length; i++) if (grid[i]) n++; return n; }
  function buriedCount() { let n = gridGrains(); for (let i = 0; i < bands.length; i++) n += bands[i].n; return n; } // active + archived
  // Show each nav bar only when that direction is reachable: "back to surface" once
  // you've left the surface, "dig" while there's still archive/well below the view.
  function updateNav() {
    const atTop = follow || cameraY <= followTarget() + 2;
    const atBot = cameraY >= maxCameraY() - 2;
    if (surfaceBtn.hidden !== atTop) surfaceBtn.hidden = atTop;
    if (peekBtn.hidden !== atBot) peekBtn.hidden = atBot;
  }
  function updateChrome() {
    barCount.textContent = myCount.toLocaleString();
    if (menu.hidden) return;
    let max = 1;
    for (const id in players) if (players[id].count > max) max = players[id].count;
    for (const id in players) {
      const u = players[id];
      ensureRow(u);
      if (u.nameEl && u.nameEl.textContent !== u.name) u.nameEl.textContent = u.name;
      if (u.swatchEl && u.swatchEl.style.background !== u.css) { u.swatchEl.style.background = u.css; u.barEl.style.background = u.css; }
      if (u.roleEl) u.roleEl.textContent = u.you ? "you" : "teammate";
      u.countEl.textContent = u.count.toLocaleString();
      u.barEl.style.width = Math.max(3, Math.round((u.count / max) * 100)) + "%";
    }
    buriedText.textContent = buriedCount().toLocaleString();
  }

  // ---------------------------------------------------------------------------
  // Main loop — NO physics. Just follow the camera and render.
  // ---------------------------------------------------------------------------
  function tick() {
    if (!ctx) { ctx = canvas.getContext("2d"); ctx.imageSmoothingEnabled = false; }
    frame++;
    // Stable surface: rise toward the pile top quickly as sand is added, but only DRIFT
    // down slowly. So the measured surface tracks the settled high-water mark and the
    // camera + spouts stay put when you're not pouring — no per-frame jitter. (smSurface
    // is a row index; smaller = higher pile, so a growing pile means s < smSurface.)
    const s = surface();
    smSurface += (s - smSurface) * (s < smSurface ? 0.2 : 0.02);
    const ft = followTarget();
    if (follow) {
      cameraY += (ft - cameraY) * 0.16;
      if (Math.abs(ft - cameraY) < 0.05) cameraY = ft;
    } else if (camTarget !== null && !drag) {   // smooth glide to the peek-button target
      cameraY += (camTarget - cameraY) * 0.2;
      if (Math.abs(camTarget - cameraY) < 0.5) { cameraY = camTarget; camTarget = null; }
    }
    cameraY = Math.min(maxCameraY(), Math.max(camLo(), cameraY));
    updateNav();
    if (PERF) { const t = performance.now(); draw(); perf.drawMs += performance.now() - t; perf.frames++; }
    else draw();
    if (frame % 12 === 0) updateChrome();
    requestAnimationFrame(tick);
  }

  // ---------------------------------------------------------------------------
  // Input · YOU — count only (Rust shell or this page's own keyboard); we report
  // the cumulative count to the server, which decides grain placement.
  // ---------------------------------------------------------------------------
  function applyCount(total) {
    total = Number(total) || 0;
    if (!youBaselineSet) { myCount = total; youBaselineSet = true; pendingTicks = myCount; return; }
    if (total > myCount) myCount = total;
    pendingTicks = myCount;
  }
  function bumpYou() { myCount++; pendingTicks = myCount; }

  if (TE) {
    TE.listen("keycount", function (e) { applyCount(e.payload); });
  } else {
    const MODS = { Shift: 1, Control: 1, Alt: 1, Meta: 1, CapsLock: 1 };
    window.addEventListener("keydown", function (e) {
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.target.closest && e.target.closest("input, textarea, button")) return;
      const k = e.key;
      if (MODS[k]) return;
      const ok = k.length === 1 || k === "Enter" || k === "Backspace" || k === " " || k === "Tab";
      if (!ok) return;
      if (k === "Tab") e.preventDefault();
      bumpYou();
    });
  }

  // ---------------------------------------------------------------------------
  // Interaction — bottle digs (camera only; never edits the grid), bar moves window.
  // ---------------------------------------------------------------------------
  canvas.addEventListener("pointerdown", function (e) {
    e.preventDefault();
    e.stopPropagation();
    drag = { y: e.clientY };
    follow = false;
    camTarget = null;          // drag overrides any in-flight peek glide
    canvas.classList.add("grabbing");
  });
  window.addEventListener("pointermove", function (e) {
    if (!drag) return;
    // Drag UP to dig down into older sand (grab-the-content feel): moving the pointer up
    // raises cameraY toward the bottom of the well. Apply the move as an INCREMENTAL delta
    // (re-anchor each move) + clamp every step, so over-dragging at the very bottom/top
    // doesn't build an invisible "dead zone" you have to un-drag before it responds — the
    // ends feel like a hard stop.
    const dy = (e.clientY - drag.y) / S;
    drag.y = e.clientY;
    cameraY = Math.min(maxCameraY(), Math.max(camLo(), cameraY - dy));
  });
  window.addEventListener("pointerup", function () {
    if (!drag) return;
    drag = null;
    canvas.classList.remove("grabbing");
    if (cameraY <= followTarget() + 12) follow = true;
  });
  surfaceBtn.addEventListener("click", function (e) { e.stopPropagation(); follow = true; camTarget = null; });
  // Dig down a page per click (replaces drag for desktop); repeat to go deeper.
  peekBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    follow = false;
    camTarget = Math.min(maxCameraY(), Math.round(cameraY) + Math.round(viewRows * 0.7));
  });

  // Only the BAR is a window-drag handle now — the transparent margins around the
  // bottle no longer grab/drag the window (they're inert). Clicking the ≡ button
  // opens the menu instead of dragging. (Full click-through-to-desktop is a separate
  // follow-up; see notes.)
  bar.addEventListener("pointerdown", function (e) {
    if (e.button !== 0) return;
    if (e.target.closest("[data-no-drag]")) return;
    if (appWindow) appWindow.startDragging();
  });

  // ---------------------------------------------------------------------------
  // Menu
  // ---------------------------------------------------------------------------
  // The bar's ≡ no longer drops an inline panel (it was clipped by this tiny window).
  // In the shell it toggles a SEPARATE, frameless popover window (label "menu", declared in
  // tauri.conf, positioned/shown/hidden by Rust beside the bottle on this 'menu:toggle' event);
  // that window renders the menu and sends actions back as 'menu:cmd' (handled below). In
  // a plain browser there's no shell, so ≡ falls back to toggling the inline panel for dev.
  menuBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    if (TE && TE.emit) { TE.emit("menu:toggle"); return; }            // shell: toggle popover window
    menu.hidden = !menu.hidden; if (!menu.hidden) updateChrome();     // browser: inline fallback
  });
  document.addEventListener("click", function (e) {
    if (!appWindow && !menu.hidden && !menu.contains(e.target) && e.target !== menuBtn) menu.hidden = true;
  });
  // Browser-dev fallback: in the App, ≡ opens the popover window and the debug fill
  // controls live there (runMenuWindow). In a plain browser there's no shell/popover,
  // so wire the SAME controls into the inline menu and talk to the WS directly.
  if (DEBUG && !TE) {
    debugSep.hidden = false; debugRow.hidden = false;
    debugSwitch.addEventListener("click", function (e) {
      e.stopPropagation();
      const open = debugSwitch.getAttribute("aria-checked") !== "true";
      debugSwitch.setAttribute("aria-checked", open ? "true" : "false");
      debugBody.hidden = !open;
    });
    const send = function (m) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(m)); };
    const sync = function () {
      pourBtn.classList.toggle("on", dbg.pour);
      floodBtn.classList.toggle("on", dbg.flood);
      for (const b of brushRow.querySelectorAll("button")) b.classList.toggle("on", +b.dataset.size === dbg.spout);
    };
    for (let n = 1; n <= 5; n++) {
      const b = document.createElement("button");
      b.textContent = String(n); b.title = "brush " + n + "×" + n; b.dataset.size = n;
      b.addEventListener("click", function (e) { e.stopPropagation(); dbg.spout = n; send({ type: "spout", size: n }); sync(); });
      brushRow.appendChild(b);
    }
    pourBtn.addEventListener("click", function (e) { e.stopPropagation(); dbg.pour = !dbg.pour; send({ type: "pour", on: dbg.pour }); sync(); });
    floodBtn.addEventListener("click", function (e) { e.stopPropagation(); dbg.flood = !dbg.flood; send({ type: "flood", on: dbg.flood }); sync(); });
    sync();
    setInterval(function () { perfBox.textContent = perfLine || "—"; }, 1000);
  }
  resetBtn.addEventListener("click", function () {
    // server-authoritative: ask the server to empty the room's canvas (browser inline path)
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "reset" }));
    menu.hidden = true;
  });
  exitBtn.addEventListener("click", function () {
    if (appWindow) appWindow.close(); else window.close();
  });

  // ---------------------------------------------------------------------------
  // Networking — connect to the authoritative server; render what it sends.
  //   client → server : {join,name,color} / {input,ticks} / {leave} / {reset}
  //   server → client : snapshot / patch / players / error
  // ---------------------------------------------------------------------------
  const CODE_ALPHABET = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  function makeRoomCode() { let s = ""; for (let i = 0; i < 4; i++) s += CODE_ALPHABET[(Math.random() * CODE_ALPHABET.length) | 0]; return s; }
  function normRoom(s) { return String(s || "").trim().toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 12); }

  let roomId = normRoom(params.get("room")) || normRoom(localStorage.getItem("titb.room")) || makeRoomCode();
  localStorage.setItem("titb.room", roomId);

  function freshId() {
    return (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : (Date.now().toString(36) + Math.random().toString(36).slice(2));
  }
  let myId = localStorage.getItem("titb.playerId");
  if (!myId) { myId = freshId(); localStorage.setItem("titb.playerId", myId); }
  let playerName = localStorage.getItem("titb.name") || ("玩家-" + myId.slice(0, 4));

  // Host: where to reach the authoritative server. The VPS serves THIS page AND the
  // ws endpoint from the same origin, so by default we just talk back to wherever the
  // page came from. That makes every case work with no config: prod (https → wss on
  // sandtogether.indiegames.design), pure-IP, and `npm run server` (http → ws on
  // 127.0.0.1:8090) alike. file:// has no usable origin, so it falls back to the local
  // dev server. Override with ?host=… or localStorage('titb.partyhost').
  const isFile = location.protocol === "file:";
  const PARTY_HOST = params.get("host") || localStorage.getItem("titb.partyhost")
    || (isFile ? "127.0.0.1:8090" : location.host);
  // wss only when the page itself is https (else mixed-content blocks it); ws otherwise.
  const wsProto = location.protocol === "https:" ? "wss" : "ws";

  function b64ToU8(b64) {
    const s = atob(b64 || ""), u = new Uint8Array(s.length);
    for (let i = 0; i < s.length; i++) u[i] = s.charCodeAt(i);
    return u;
  }
  function b64ToCells(b64, len) { const u = b64ToU8(b64), c = new Uint8Array(len); c.set(u.subarray(0, len)); return c; }
  function removePlayer(id) {
    const u = players[id];
    if (!u) return;
    if (u.rowEl) u.rowEl.remove();
    delete players[id];
  }
  function applyPlayers(pl) {
    const seen = Object.create(null);
    for (const id in pl) {
      seen[id] = true;
      const p = pl[id] || {};
      const slot = colorToSlot(p.color);
      let u = players[id];
      if (!u) {
        u = { id: id, name: p.name || "玩家", slot: slot, css: USER_COLORS[slot - 1].css,
              x: SPOUT_X[slot] || 40, count: Number(p.ticks) || 0, you: id === myId, online: true };
        players[id] = u;
      } else {
        u.slot = slot; u.css = USER_COLORS[slot - 1].css; u.x = SPOUT_X[slot] || 40;
        if (p.name) u.name = p.name;
        u.online = true;
      }
      // our own count is driven locally (zero-latency); others come from server
      u.count = (id === myId) ? myCount : (Number(p.ticks) || 0);
    }
    for (const id in players) if (!seen[id]) removePlayer(id);
  }
  function applySnapshot(msg) {
    grid.fill(0);
    if (msg.grid) { const u8 = b64ToU8(msg.grid); grid.set(u8.subarray(0, W * H)); }
    bands = Array.isArray(msg.bands)
      ? msg.bands.map(function (b) { const rows = b.rows | 0; return { rows: rows, n: b.n | 0, cells: b64ToCells(b.cells, rows * W) }; })
      : [];
    rebuildArchive();
    if (msg.players) applyPlayers(msg.players);
    smSurface = surface();                 // land on the real surface, no swoop on join
    if (follow) cameraY = followTarget();
  }
  function applyPatch(cells) {
    if (!cells) return;
    for (let i = 0; i + 1 < cells.length; i += 2) { const idx = cells[i]; if (idx >= 0 && idx < grid.length) grid[idx] = cells[i + 1]; }
  }
  // Stage 3: a new archived layer. Mirror the server's deterministic shift (slide the
  // whole grid down K rows, freeing the top), then archive the band. Because the band
  // occupies K world rows at true height, EVERYTHING below the freed top moves down by
  // exactly K — the active surface AND every older band alike — so a single `cameraY +=
  // K` keeps the view rock-steady whether you're following the surface or parked deep
  // in history. Compression is therefore invisible in normal use.
  function applyBand(msg) {
    const K = msg.rows | 0;
    if (K <= 0 || K >= H) return;
    grid.copyWithin(K * W, 0, (H - K) * W);
    grid.fill(0, 0, K * W);
    bands.push({ rows: K, n: msg.n | 0, cells: b64ToCells(msg.cells, K * W) });
    rebuildArchive();
    smSurface += K;
    cameraY = Math.min(maxCameraY(), cameraY + K);
  }

  let ws = null, reconnectTimer = null, roomFull = false;
  function setLive(ok) { if (liveDot) liveDot.classList.toggle("off", !ok); }
  function showRoomFull() {
    roomFull = true; setLive(false);
    if (roomCodeEl) { roomCodeEl.textContent = "FULL"; setTimeout(updateRoomLabel, 2500); }
  }
  function sendJoin() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "join", name: playerName, color: "auto" }));
      pendingTicks = myCount;
    }
  }
  function onWsMessage(e) {
    const pt = PERF ? performance.now() : 0;
    let data; try { data = JSON.parse(e.data); } catch (_) { return; }
    if (!data) return;
    if (data.type === "snapshot") applySnapshot(data);
    else if (data.type === "patch") applyPatch(data.c);
    else if (data.type === "band") applyBand(data);
    else if (data.type === "players") applyPlayers(data.players || {});
    else if (data.type === "error") { if (data.reason === "room_full") showRoomFull(); }
    else if (data.type === "pong" && PERF) { perf.rtt = performance.now() - data.t; return; }
    if (PERF) {
      perf.parseMs += performance.now() - pt;
      if (data.type === "patch") { perf.patches++; perf.bytes += (e.data.length || 0); const c = data.c ? data.c.length / 2 : 0; perf.cells += c; if (c > perf.peakCells) perf.peakCells = c; }
    }
  }
  function scheduleReconnect() {
    ws = null; setLive(false);
    if (roomFull) return;
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(function () { reconnectTimer = null; connect(); }, 2000);
  }
  function connect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (!PARTY_HOST) { setLive(false); return; } // no host configured → stay idle
    let socket;
    try {
      socket = new WebSocket(wsProto + "://" + PARTY_HOST + "/r/" + encodeURIComponent(roomId) + "?_pk=" + encodeURIComponent(myId));
    } catch (_) { return; }
    ws = socket;
    socket.onopen = function () { sendJoin(); setLive(true); };
    socket.onmessage = onWsMessage;
    socket.onclose = scheduleReconnect;
    socket.onerror = function () {};
  }
  function reconnect() {
    if (ws) { ws.onclose = null; try { ws.close(); } catch (_) {} ws = null; }
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    connect();
  }
  function sendLeave() { if (ws && ws.readyState === WebSocket.OPEN) { try { ws.send(JSON.stringify({ type: "leave" })); } catch (_) {} } }

  // report our cumulative count on a 10fps throttle
  setInterval(function () {
    if (pendingTicks !== null && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "input", ticks: pendingTicks }));
      pendingTicks = null;
    }
  }, 100);

  // ---------------------------------------------------------------------------
  // Room controls (menu)
  // ---------------------------------------------------------------------------
  function updateRoomLabel() { if (roomCodeEl) roomCodeEl.textContent = roomId; }
  function clearRoomLocal() {
    grid.fill(0); bands = []; rebuildArchive();
    for (const id in players) removePlayer(id);
    cameraY = H - viewRows; follow = true; smSurface = H;
  }
  function switchRoom(code) {
    const r = normRoom(code);
    if (!r || r === roomId) return;
    sendLeave();
    roomId = r; localStorage.setItem("titb.room", roomId);
    clearRoomLocal();
    roomFull = false;
    updateRoomLabel();
    reconnect();
  }
  function newRoom() { let c; do { c = makeRoomCode(); } while (c === roomId); switchRoom(c); }
  function shareLink() { const u = new URL(location.href); u.searchParams.set("room", roomId); return u.toString(); }
  function copyText(t) {
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).catch(function () { fallbackCopy(t); });
    else fallbackCopy(t);
  }
  function fallbackCopy(t) {
    const ta = document.createElement("textarea");
    ta.value = t; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand("copy"); } catch (_) {}
    ta.remove();
  }
  let editMode = "room";
  function openEdit(mode) {
    editMode = mode;
    editRow.hidden = false;
    if (mode === "name") { editInput.value = playerName; editInput.placeholder = "你的昵称…"; editInput.maxLength = 16; }
    else { editInput.value = roomId; editInput.placeholder = "输入房间号加入…"; editInput.maxLength = 12; }
    editInput.focus(); editInput.select();
  }
  function saveEdit() {
    const v = editInput.value.trim();
    if (editMode === "name") { if (v) { playerName = v; localStorage.setItem("titb.name", playerName); reconnect(); } }
    else { switchRoom(v); }
    editRow.hidden = true;
  }
  newRoomBtn.addEventListener("click", function () { newRoom(); });
  joinRoomBtn.addEventListener("click", function () { openEdit("room"); });
  nameBtn.addEventListener("click", function () { openEdit("name"); });
  copyLinkBtn.addEventListener("click", function () {
    copyText(shareLink());
    const old = copyLinkBtn.textContent;
    copyLinkBtn.textContent = "✓ copied";
    setTimeout(function () { copyLinkBtn.textContent = old; }, 1200);
  });
  editSave.addEventListener("click", saveEdit);
  editInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") saveEdit();
    else if (e.key === "Escape") editRow.hidden = true;
  });

  // --- perf sampling (diagnostic; only when ?perf=1 / #perf / ?debug=1) ---
  // The readout no longer floats over the canvas (it covered the bottom buttons);
  // the sampled line is pushed to the menu popover's debug panel via menu:state.
  function startPerf() {
    if (!PERF) return;
    perf.t0 = performance.now();
    setInterval(function () {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping", t: performance.now() }));
      const dt = (performance.now() - perf.t0) / 1000 || 1;
      const fps = perf.frames / dt, pps = perf.patches / dt;
      const avgB = perf.patches ? perf.bytes / perf.patches : 0;
      const avgC = perf.patches ? perf.cells / perf.patches : 0;
      const drawMs = perf.frames ? perf.drawMs / perf.frames : 0;
      const parseMs = perf.patches ? perf.parseMs / perf.patches : 0;
      perfLine =
        "fps " + fps.toFixed(0) + "  draw " + drawMs.toFixed(2) + "ms/f\n" +
        pps.toFixed(0) + " patch/s  ~" + avgB.toFixed(0) + "B/" + avgC.toFixed(0) + "cells (peak " + perf.peakCells + ")\n" +
        "parse+apply " + parseMs.toFixed(2) + "ms  rtt " + perf.rtt.toFixed(0) + "ms\n" +
        "grains " + gridGrains() + "  bands " + bands.length;
      perf.frames = perf.patches = perf.bytes = perf.cells = perf.peakCells = perf.parseMs = perf.drawMs = 0;
      perf.t0 = performance.now();
    }, 1000);
  }

  // Debug fill controls (?debug=1) live in the menu popover now (see runMenuWindow);
  // the App forwards them to the WS as spout/pour/flood in the menu:cmd handler below.

  // --- bridge to the menu popover window (separate #menu window) ---
  // We own the room + WS, so the popover sends us intents ('menu:cmd') and we act;
  // we push it the live roster ('menu:state') on request and on a light timer.
  function menuStatePayload() {
    const list = [];
    for (const id in players) {
      const u = players[id];
      list.push({ name: u.name, css: u.css, count: u.count || 0, you: !!u.you });
    }
    list.sort(function (a, b) { return b.count - a.count; });
    return { players: list, buried: buriedCount(), room: roomId, link: shareLink(),
             debug: DEBUG, dbg: { flood: dbg.flood, pour: dbg.pour, spout: dbg.spout },
             perf: PERF ? perfLine : "" };
  }
  function startMenuBridge() {
    if (!TE) return;                       // browser dev has no shell event bus
    const push = function () { if (TE.emit) TE.emit("menu:state", menuStatePayload()); };
    if (TE.listen) {
      TE.listen("menu:request", push);     // popover just opened → send current state
      TE.listen("menu:cmd", function (e) {
        const d = (e && e.payload) || {};
        switch (d.action) {
          case "newRoom":  newRoom(); break;
          case "join":     if (d.room) switchRoom(d.room); break;
          case "setName":  if (d.name) { playerName = d.name; localStorage.setItem("titb.name", playerName); reconnect(); } break;
          case "reset":    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "reset" })); break;
          case "flood":    dbg.flood = !!d.on;  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "flood", on: dbg.flood })); break;
          case "pour":     dbg.pour  = !!d.on;  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "pour",  on: dbg.pour  })); break;
          case "spout":    dbg.spout = Math.max(1, Math.min(5, d.size | 0)); if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "spout", size: dbg.spout })); break;
        }
        push();                            // reflect the change back immediately
      });
    }
    setInterval(push, 700);                // keep the ranking live while it's open (cheap)
  }

  // --- init ---
  updateRoomLabel();
  updateChrome();
  requestAnimationFrame(tick);
  connect();
  startPerf();
  startMenuBridge();
})();
</script>
</body>
</html>
