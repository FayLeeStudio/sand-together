name: build-macos

# Manual trigger: GitHub repo → Actions tab → "build-macos" → Run workflow.
# Builds the Tauri desktop-pet for macOS on a GitHub-hosted Mac runner — no local
# Mac needed. The window loads the remote VPS page, so there's no frontend to
# bundle. Produces a universal (Intel + Apple Silicon) .dmg / .app as an artifact.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (both mac targets, for a universal build)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install npm deps (@tauri-apps/cli etc.)
        run: npm install

      - name: frontendDist placeholder (window url is the remote VPS; nothing to bundle)
        run: mkdir -p dist

      - name: Build universal .app / .dmg
        run: npx tauri build --target universal-apple-darwin

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: sand-together-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error
